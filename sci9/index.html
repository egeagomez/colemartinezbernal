<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎛️ Sound DJ Studio</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#311b92 0%,#00897b 50%,#ffca28 100%) fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}.eq{position:absolute;width:8px;border-radius:12px;background:rgba(255,255,255,.25);animation:eq 1.2s ease-in-out infinite}.e1{left:7%;top:20%;height:50px}.e2{left:10%;top:20%;height:75px;animation-delay:.2s}.e3{left:13%;top:20%;height:40px;animation-delay:.5s}.e4{right:8%;top:70%;height:58px}.e5{right:11%;top:70%;height:35px;animation-delay:.3s}.e6{right:14%;top:70%;height:68px;animation-delay:.6s}@keyframes eq{0%,100%{transform:scaleY(.6)}50%{transform:scaleY(1.2)}}
main{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center}
.top-bar{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}.back-btn{background:#1a237e;color:#FFD700;border:2px solid #80cbc4;border-radius:14px;padding:6px 14px;font-family:inherit;font-size:.95rem;cursor:pointer;text-decoration:none}.back-btn:hover{background:#80cbc4;color:#1a237e}
.score-box{background:#1a237e;color:#FFD700;border:2px solid #80cbc4;border-radius:20px;padding:4px 16px;font-size:1rem}
.phase-bar{display:flex;gap:6px;margin:8px 0 14px;flex-wrap:wrap;justify-content:center}.p-tab{padding:6px 16px;border-radius:20px;font-family:inherit;font-size:.92rem;border:2px solid #80cbc4;background:#1a237e;color:#b2dfdb}.p-tab.active{background:#26a69a;color:#fff;font-weight:bold}.p-tab.done{background:#2e7d32;border-color:#66bb6a;color:#fff}
.phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:700px;padding:0 12px}.phase.active{display:flex}.ph-title{font-size:1.15rem;color:#fff59d;text-align:center;margin-bottom:12px}
.fb{min-height:2rem;font-size:1.08rem;text-align:center;margin:8px 0}.fb.ok{color:#69f0ae}.fb.no{color:#ff8a80}
.btn-main{background:linear-gradient(135deg,#ffca28,#ff8f00);color:#1a237e;border:2px solid #fff59d;border-radius:20px;padding:10px 26px;font-family:inherit;font-size:1.03rem;cursor:pointer;margin-top:8px;font-weight:bold}
.flash-ov{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:20}.flash-ov.g{background:rgba(76,175,80,.22);opacity:1}.flash-ov.r{background:rgba(244,67,54,.2);opacity:1}
.flashcard{width:100%;max-width:380px;min-height:310px;background:linear-gradient(145deg,#1a237e,#00695c);border:3px solid #80cbc4;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:18px;text-align:center;cursor:pointer;transition:transform .2s}.flashcard:hover{transform:scale(1.03)}
.c-emoji{font-size:4.2rem}.c-title{font-size:1.65rem;color:#FFD700}.c-type{font-size:1rem;color:#80cbc4;font-weight:bold}.c-desc{font-size:1rem;color:#e0f2f1;line-height:1.35}
.card-nav{display:flex;align-items:center;gap:14px;margin:12px 0 6px}.nav-btn{background:#1a237e;color:#FFD700;border:2px solid #80cbc4;border-radius:50%;width:44px;height:44px;font-size:1.4rem;cursor:pointer}.nav-btn:disabled{opacity:.35;cursor:default}
.prog{display:flex;gap:7px}.dot{width:12px;height:12px;border-radius:50%;border:2px solid #80cbc4;background:#1a237e}.dot.seen{background:#26a69a}.dot.active{background:#FFD700;border-color:#ffca28}
.sort-card{width:100%;max-width:500px;background:linear-gradient(145deg,#1a237e,#00695c);border:2px solid #80cbc4;border-radius:18px;padding:18px;text-align:center}.s-emoji{font-size:3rem}.s-name{font-size:1.3rem;color:#FFD700;font-weight:bold}.s-hint{font-size:.95rem;color:#b2dfdb;margin-bottom:10px}
.sort-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.sort-btn{padding:10px 14px;border-radius:14px;font-family:inherit;font-size:1rem;cursor:pointer;border:2px solid;font-weight:bold}.sort-btn.loud{background:#c62828;color:#FFD700;border-color:#ef9a9a}.sort-btn.soft{background:#2e7d32;color:#FFD700;border-color:#a5d6a7}.sort-btn.high{background:#6a1b9a;color:#FFD700;border-color:#ce93d8}.sort-btn.low{background:#1565c0;color:#FFD700;border-color:#90caf9}
.sp{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 0}.sp-dot{width:26px;height:26px;border-radius:50%;border:2px solid #80cbc4;display:flex;align-items:center;justify-content:center;background:#1a237e;color:#b2dfdb;font-size:.72rem}.sp-dot.correct{background:#1b5e20;border-color:#69f0ae;color:#69f0ae}.sp-dot.wrong{background:#4e1212;border-color:#ff8a80;color:#ff8a80}.sp-dot.current{border-color:#FFD700;background:#4e342e;color:#FFD700}
.quiz-card{width:100%;max-width:520px;background:#1a237e;border:2px solid #80cbc4;border-radius:16px;padding:20px;text-align:center}.q-prog{color:#b2dfdb;font-size:.92rem}.q-emoji{font-size:2.8rem;margin:6px 0}.q-q{font-size:1.15rem;color:#FFD700;margin:10px 0 12px}
.q-opts{display:flex;flex-direction:column;gap:10px;align-items:center}.q-opt{width:100%;max-width:390px;background:linear-gradient(135deg,#311b92,#00695c);border:2px solid #80cbc4;border-radius:14px;padding:11px 14px;color:#fff;font-family:inherit;font-size:1rem;cursor:pointer;text-align:left}.q-opt:hover:not(:disabled){border-color:#FFD700}.q-opt.correct-ans{border-color:#69f0ae;background:#1b5e20;color:#69f0ae}.q-opt.wrong-ans{border-color:#ff8a80;background:#4e1212;color:#ff8a80}
.finish{display:none;background:#1a237e;border:2px solid #69f0ae;border-radius:14px;padding:14px 20px;color:#69f0ae;margin-top:12px;text-align:center}.finish-row{display:none;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px}
</style>
</head>
<body>
<div class="bg"><span class="eq e1"></span><span class="eq e2"></span><span class="eq e3"></span><span class="eq e4"></span><span class="eq e5"></span><span class="eq e6"></span></div>
<div class="flash-ov" id="fov"></div>
<main>
  <div class="top-bar">
    <a class="back-btn" href="../asignaturas.html#science">← Science</a>
    <span style="color:#FFD700;font-size:1.08rem">🎛️ Sound DJ Studio</span>
    <div class="score-box">⭐ <span id="scoreDisp">0</span></div>
  </div>

  <div class="phase-bar">
    <div class="p-tab active" id="tab1">📚 Learn</div>
    <div class="p-tab" id="tab2">🎚️ Classify</div>
    <div class="p-tab" id="tab3">❓ Quiz</div>
  </div>

  <div class="phase active" id="phase1">
    <p class="ph-title">Learn types of sounds and their uses.</p>
    <div class="flashcard" onclick="speakCurrent()">
      <div class="c-emoji" id="cEmoji"></div>
      <div class="c-title" id="cTitle"></div>
      <div class="c-type" id="cType"></div>
      <div class="c-desc" id="cDesc"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn-main" onclick="speakCurrent()">🔊 Say it</button>
      <button class="btn-main" id="phase1Btn" onclick="goTab(2)" disabled>✅ Classify sounds</button>
    </div>
    <div class="card-nav">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()" disabled>◀</button>
      <div class="prog" id="prog"></div>
      <button class="nav-btn" id="nextBtn" onclick="nextCard()">▶</button>
    </div>
  </div>

  <div class="phase" id="phase2">
    <p class="ph-title">Choose the best type for each sound clue.</p>
    <div class="sp" id="spBar"></div>
    <div class="sort-card" id="sortCard">
      <div class="s-emoji" id="sEmoji"></div>
      <div class="s-name" id="sName"></div>
      <div class="s-hint" id="sHint"></div>
      <div class="sort-btns">
        <button class="sort-btn loud" onclick="sortAnswer('loud')">📣 Loud</button>
        <button class="sort-btn soft" onclick="sortAnswer('soft')">🤫 Soft</button>
        <button class="sort-btn high" onclick="sortAnswer('high')">🐭 High</button>
        <button class="sort-btn low" onclick="sortAnswer('low')">🦁 Low</button>
      </div>
    </div>
    <div class="fb" id="fb2"></div>
    <button class="btn-main" id="btn2" onclick="goTab(3)" style="display:none">✅ Go to quiz</button>
  </div>

  <div class="phase" id="phase3">
    <div class="quiz-card" id="quizCard">
      <div class="q-prog" id="qProg"></div>
      <div class="q-emoji" id="qEmoji"></div>
      <div class="q-q" id="qQ"></div>
      <div class="q-opts" id="qOpts"></div>
    </div>
    <div class="fb" id="fb3"></div>
    <div class="finish" id="finish"></div>
    <div class="finish-row" id="finishRow">
      <button class="btn-main" onclick="location.reload()">🔄 Play again</button>
      <button class="btn-main" onclick="location.href='../asignaturas.html#science'">🏠 Science menu</button>
    </div>
  </div>
</main>

<script>
let score=0;const $=id=>document.getElementById(id);
const flash=c=>{const e=$('fov');e.className='flash-ov '+c;setTimeout(()=>e.className='flash-ov',260);};
function speak(t){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=0.88;speechSynthesis.speak(u);} 
const addScore=n=>{$('scoreDisp').textContent=score+=n;};
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
function goTab(n){[1,2,3].forEach(i=>{$('phase'+i).classList.remove('active');$('tab'+i).classList.remove('active');});$('phase'+n).classList.add('active');$('tab'+n).classList.add('active');if(n===2)buildSort();if(n===3)buildQuiz();}
function markDone(n){$('tab'+n).classList.remove('active');$('tab'+n).classList.add('done');}

const CARDS=[
  {emoji:'📣',title:'Loud',type:'VOLUME',desc:'A loud sound has strong volume. Example: drum, siren, thunder.'},
  {emoji:'🤫',title:'Soft',type:'VOLUME',desc:'A soft sound has low volume. Example: whisper, leaves, gentle music.'},
  {emoji:'🐭',title:'High Sound',type:'PITCH',desc:'High sounds are thin and sharp. Example: whistle, small bird chirp.'},
  {emoji:'🦁',title:'Low Sound',type:'PITCH',desc:'Low sounds are deep and heavy. Example: lion roar, big drum.'},
  {emoji:'🎉',title:'Sound for Fun',type:'USE OF SOUND',desc:'Songs, music and games use sound for fun.'},
  {emoji:'📞',title:'Sound for Communication',type:'USE OF SOUND',desc:'Voices, telephones and alarms help people communicate.'},
];

const SORT_ITEMS=[
  {emoji:'🥁',name:'Big drum boom',hint:'Very strong volume.',type:'loud'},
  {emoji:'👂',name:'Whisper',hint:'Very quiet volume.',type:'soft'},
  {emoji:'🐤',name:'Tiny bird chirp',hint:'Sharp pitch.',type:'high'},
  {emoji:'🐻',name:'Bear growl',hint:'Deep pitch.',type:'low'},
  {emoji:'🚨',name:'Ambulance siren',hint:'Very strong volume.',type:'loud'},
  {emoji:'🍃',name:'Soft wind',hint:'Quiet sound.',type:'soft'},
  {emoji:'🎶',name:'Flute note',hint:'Thin and sharp pitch.',type:'high'},
  {emoji:'🎺',name:'Tuba note',hint:'Deep heavy pitch.',type:'low'},
];

const QUIZ=[
  {q:'Which pair compares VOLUME?',opts:['High and low','Loud and soft','Fast and slow'],ans:1,emoji:'🎚️'},
  {q:'Which pair compares PITCH?',opts:['Loud and soft','High and low','Big and small'],ans:1,emoji:'🎼'},
  {q:'A whisper is usually...',opts:['Loud','Soft','High only'],ans:1,emoji:'🤫'},
  {q:'A lion roar is usually...',opts:['Low pitch','High pitch','No pitch'],ans:0,emoji:'🦁'},
  {q:'Music in games is sound for...',opts:['Fun','Communication only','Silence'],ans:0,emoji:'🎮'},
  {q:'A telephone ring helps with...',opts:['Fun only','Communication','Sleeping'],ans:1,emoji:'📞'},
  {q:'A whistle sound is often...',opts:['Low pitch','High pitch','Soft always'],ans:1,emoji:'🐭'},
  {q:'An alarm sound should be...',opts:['Soft and hidden','Loud so people hear it','Low and silent'],ans:1,emoji:'🚨'},
];

let ci=0,seen=new Set([0]);
function showCard(){const c=CARDS[ci];$('cEmoji').textContent=c.emoji;$('cTitle').textContent=c.title;$('cType').textContent=c.type;$('cDesc').textContent=c.desc;$('prevBtn').disabled=ci===0;$('nextBtn').disabled=ci===CARDS.length-1;$('prog').innerHTML=CARDS.map((_,i)=>`<div class="dot${seen.has(i)?' seen':''}${i===ci?' active':''}"></div>`).join('');if(seen.size===CARDS.length)$('phase1Btn').disabled=false;}
function nextCard(){if(ci<CARDS.length-1){ci++;seen.add(ci);showCard();}}
function prevCard(){if(ci>0){ci--;showCard();}}
function speakCurrent(){const c=CARDS[ci];speak(c.title+'. '+c.desc);} showCard();

let sortItems=[],si=0,sc=0;
function buildSort(){sortItems=shuffle(SORT_ITEMS);si=0;sc=0;$('btn2').style.display='none';$('fb2').textContent='';renderBar();showSort();}
function renderBar(){$('spBar').innerHTML=sortItems.map((_,i)=>{let cls='sp-dot';if(i===si)cls+=' current';return `<div class="${cls}" id="sd${i}">${i+1}</div>`;}).join('');}
function showSort(){if(si>=sortItems.length){endSort();return;}const it=sortItems[si];$('sEmoji').textContent=it.emoji;$('sName').textContent=it.name;$('sHint').textContent=it.hint;renderBar();speak(it.name);}
function sortAnswer(ans){const it=sortItems[si],dot=$('sd'+si);if(ans===it.type){flash('g');addScore(10);sc++;dot.classList.add('correct');$('fb2').className='fb ok';$('fb2').textContent='✅ Correct! '+it.name+' is '+it.type+'.';}else{flash('r');dot.classList.add('wrong');$('fb2').className='fb no';$('fb2').textContent='❌ '+it.name+' is '+it.type+'.';}si++;setTimeout(showSort,1000);}
function endSort(){markDone(2);$('sortCard').innerHTML='<div style="font-size:2rem">🎉</div><div style="font-size:1.2rem;color:#69f0ae">Great! '+sc+' / '+sortItems.length+' correct.</div>';$('fb2').textContent='';$('btn2').style.display='';}

let quizItems=[],qi=0,qc=0;
function buildQuiz(){quizItems=shuffle(QUIZ);qi=0;qc=0;$('finish').style.display='none';$('finishRow').style.display='none';$('quizCard').style.display='';$('fb3').textContent='';showQ();}
function showQ(){if(qi>=quizItems.length){endQuiz();return;}const q=quizItems[qi];$('qProg').textContent='Question '+(qi+1)+' / '+quizItems.length;$('qEmoji').textContent=q.emoji;$('qQ').textContent=q.q;$('qOpts').innerHTML=q.opts.map((o,i)=>`<button class="q-opt" onclick="ansQ(${i})">${o}</button>`).join('');}
function ansQ(i){const q=quizItems[qi],btns=[...document.querySelectorAll('.q-opt')];btns.forEach(b=>b.disabled=true);if(i===q.ans){flash('g');addScore(15);qc++;btns[i].classList.add('correct-ans');$('fb3').className='fb ok';$('fb3').textContent='✅ Great!';}else{flash('r');btns[i].classList.add('wrong-ans');btns[q.ans].classList.add('correct-ans');$('fb3').className='fb no';$('fb3').textContent='❌ Keep trying!';}qi++;setTimeout(showQ,1000);}
function endQuiz(){markDone(3);$('quizCard').style.display='none';$('finish').style.display='block';$('finish').textContent='🏁 Quiz: '+qc+' / '+quizItems.length+' correct. Total score: '+score+' ⭐';$('finishRow').style.display='flex';$('fb3').textContent='';}
</script>
</body>
</html>
