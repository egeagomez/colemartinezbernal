<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>✏️ Clothes Crossword</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#0a1a0a 0%,#0d2a1a 100%) fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 32px}
    .top-bar{width:100%;max-width:640px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
    .back-btn{background:#1b3a1b;color:#FFD700;border:2px solid #4CAF50;border-radius:14px;padding:5px 14px;font-family:inherit;font-size:.9rem;cursor:pointer;text-decoration:none}
    .back-btn:hover{background:#4CAF50;color:#fff}
    .title-badge{font-size:1.05rem;color:#FFD700}
    .score-box{background:#1b3a1b;color:#FFD700;border:2px solid #4CAF50;border-radius:20px;padding:4px 16px;font-size:1rem}

    /* hint bg */
    .hint-img{width:100%;max-width:640px;height:70px;object-fit:cover;border-radius:12px;opacity:.55;margin:6px 0;border:2px solid #4CAF50}

    /* grid */
    .grid-wrap{overflow-x:auto;width:100%;max-width:640px;padding:0 8px;margin:8px 0}
    .grid{display:inline-grid;grid-template-columns:repeat(8,50px);grid-template-rows:repeat(10,50px);gap:3px}
    .cell-black{width:50px;height:50px;background:#111;border-radius:4px}
    .cell{position:relative;width:50px;height:50px}
    .cell input{
      width:100%;height:100%;text-align:center;text-transform:uppercase;
      font-family:'Patrick Hand',cursive;font-size:1.5rem;font-weight:bold;
      background:#1b3a1b;color:#fff;border:2px solid #4CAF50;
      border-radius:6px;outline:none;cursor:pointer;caret-color:transparent;
    }
    .cell input.selected-word{background:#0a2a0a;border-color:#a5d6a7}
    .cell input.selected-cell{background:#1a3a0a;border-color:#FFD700;color:#FFD700}
    .cell input.correct{background:#1b4a1b;border-color:#69f0ae;color:#69f0ae}
    .cell input.wrong  {background:#3a1010;border-color:#ff5252;color:#ff5252}
    .clue-num{position:absolute;top:2px;left:3px;font-size:.52rem;color:#FFD700;line-height:1;pointer-events:none;z-index:2}

    /* clues panel */
    .clues-row{display:flex;gap:12px;width:100%;max-width:640px;padding:0 8px;flex-wrap:wrap}
    .clues-box{flex:1;min-width:200px;background:#0d1f0d;border:2px solid #4CAF50;border-radius:14px;padding:12px 14px}
    .clues-title{font-size:1rem;font-weight:bold;color:#a5d6a7;margin-bottom:8px;border-bottom:1px solid #2a4a2a;padding-bottom:4px}
    .clue-item{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;border-radius:8px;padding:4px 6px;transition:background .15s}
    .clue-item:hover{background:#1a3a1a}
    .clue-item.active{background:#1a3a1a;border-left:3px solid #FFD700;padding-left:3px}
    .clue-num-label{color:#FFD700;font-size:.95rem;min-width:22px}
    .clue-emoji{font-size:1.3rem}
    .clue-es{font-size:.95rem;color:#a5d6a7}
    .clue-len{font-size:.8rem;color:#666}

    /* buttons */
    .btn-row{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap;justify-content:center}
    .btn-check{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:2px solid #42a5f5;border-radius:20px;padding:9px 28px;font-family:inherit;font-size:1rem;cursor:pointer}
    .btn-check:hover{background:#1976d2}
    .btn-reveal{background:#1b3a1b;color:#a5d6a7;border:2px solid #4CAF50;border-radius:20px;padding:9px 22px;font-family:inherit;font-size:1rem;cursor:pointer}
    .btn-reveal:hover{background:#2a4a2a}
    .btn-reset{background:#2a1010;color:#ff8a80;border:2px solid #f44336;border-radius:20px;padding:9px 22px;font-family:inherit;font-size:1rem;cursor:pointer}
    .btn-reset:hover{background:#3a1a1a}
    .result-msg{font-size:1.1rem;text-align:center;min-height:2rem;margin:4px 0}
    .result-msg.win{color:#69f0ae}
    .result-msg.partial{color:#ffe082}

    .speak-clue{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0;margin-left:2px}
    .finish-row{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;justify-content:center}
  </style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← Home</a>
  <span class="title-badge">✏️ Clothes Crossword</span>
  <div class="score-box">⭐ <span id="scoreDisp">0</span></div>
</div>
<img class="hint-img" src="crosswords.jpg" alt="crossword hint">

<div class="grid-wrap"><div class="grid" id="grid"></div></div>

<div class="btn-row">
  <button class="btn-check"  onclick="checkAll()">✅ Check</button>
  <button class="btn-reveal" onclick="revealAll()">💡 Reveal all</button>
  <button class="btn-reset"  onclick="resetAll()">🔄 Reset</button>
</div>
<div class="result-msg" id="resultMsg"></div>

<div class="clues-row">
  <div class="clues-box">
    <div class="clues-title">➡️ ACROSS</div>
    <div id="acrossClues"></div>
  </div>
  <div class="clues-box">
    <div class="clues-title">⬇️ DOWN</div>
    <div id="downClues"></div>
  </div>
</div>

<div class="finish-row" id="finishRow" style="display:none">
  <a class="back-btn" href="../eng2/index.html" style="padding:10px 18px;font-size:1rem">← Back to Match</a>
  <a class="back-btn" href="../index.html" style="padding:10px 18px;font-size:1rem">🏠 Home</a>
</div>

<script>
const ROWS=10, COLS=8;

// All words with their grid positions
const ACROSS_WORDS=[
  {id:1, word:'JACKET',   row:0, col:0, emoji:'🧥', es:'chaqueta'},
  {id:6, word:'TRAINERS', row:4, col:0, emoji:'👟', es:'zapatillas'},
  {id:7, word:'JUMPER',   row:8, col:1, emoji:'🧣', es:'jersey'},
];
const DOWN_WORDS=[
  {id:2, word:'JEANS',  row:1, col:4, emoji:'👖', es:'vaqueros'},
  {id:3, word:'SHIRT',  row:2, col:3, emoji:'👔', es:'camisa'},
  {id:4, word:'DRESS',  row:2, col:5, emoji:'👗', es:'vestido'},
  {id:5, word:'HAT',    row:3, col:2, emoji:'🎩', es:'sombrero'},
  {id:6, word:'TSHIRT', row:4, col:0, emoji:'👕', es:'camiseta (t-shirt)'},
];

// Build cell map
const cellData=[];
for(let r=0;r<ROWS;r++){cellData.push([]);for(let c=0;c<COLS;c++)cellData[r].push({active:false,letter:'',clueNum:'',across:null,down:null});}

function fillWord(words,dir){
  words.forEach(w=>{
    for(let i=0;i<w.word.length;i++){
      const r=dir==='across'?w.row:w.row+i;
      const c=dir==='across'?w.col+i:w.col;
      cellData[r][c].active=true;
      cellData[r][c].letter=w.word[i];
      if(dir==='across')cellData[r][c].across=w;
      else cellData[r][c].down=w;
    }
    // clue number on starting cell
    const sr=w.row, sc=w.col;
    if(!cellData[sr][sc].clueNum)cellData[sr][sc].clueNum=w.id;
  });
}
fillWord(ACROSS_WORDS,'across');
fillWord(DOWN_WORDS,'down');

// Build DOM grid
const gridEl=document.getElementById('grid');
const inputMap={};// "r,c" -> input element

for(let r=0;r<ROWS;r++){
  for(let c=0;c<COLS;c++){
    const d=cellData[r][c];
    if(!d.active){
      const blk=document.createElement('div');blk.className='cell-black';gridEl.appendChild(blk);
    } else {
      const wrap=document.createElement('div');wrap.className='cell';
      if(d.clueNum){const num=document.createElement('div');num.className='clue-num';num.textContent=d.clueNum;wrap.appendChild(num);}
      const inp=document.createElement('input');
      inp.type='text';inp.maxLength=1;inp.autocomplete='off';
      inp.dataset.r=r;inp.dataset.c=c;
      inp.addEventListener('click',()=>clickCell(r,c));
      inp.addEventListener('keydown',e=>onKey(e,r,c));
      inp.addEventListener('input',e=>onInput(e,r,c));
      wrap.appendChild(inp);
      gridEl.appendChild(wrap);
      inputMap[`${r},${c}`]=inp;
    }
  }
}

// Selection state
let selWord=null, selDir='across';

function getInput(r,c){return inputMap[`${r},${c}`]||null;}

function clickCell(r,c){
  const d=cellData[r][c];
  // Toggle direction if both available
  if(selWord&&((selDir==='across'&&d.across===selWord)||(selDir==='down'&&d.down===selWord))){
    if(d.across&&d.down)selDir=selDir==='across'?'down':'across';
  } else {
    // Prefer the direction that has a word; if both, pick across
    if(d.across)selDir='across';
    else if(d.down)selDir='down';
  }
  selWord=selDir==='across'?d.across:d.down;
  highlightSelection(r,c);
  document.getElementById('resultMsg').textContent='';
}

function highlightSelection(activeR,activeC){
  // Clear all
  Object.values(inputMap).forEach(inp=>inp.className='');
  if(!selWord)return;
  const w=selWord;
  for(let i=0;i<w.word.length;i++){
    const r2=selDir==='across'?w.row:w.row+i;
    const c2=selDir==='across'?w.col+i:w.col;
    const inp=getInput(r2,c2);
    if(inp)inp.className='selected-word';
  }
  const cur=getInput(activeR,activeC);
  if(cur)cur.className='selected-cell';
  // Highlight clue
  highlightClue(w.id,selDir);
}

function highlightClue(id,dir){
  document.querySelectorAll('.clue-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById(`clue-${dir}-${id}`);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
}

function onInput(e,r,c){
  const inp=getInput(r,c);
  const val=inp.value.replace(/[^a-zA-Z]/g,'').toUpperCase();
  inp.value=val;
  if(val)advanceCursor(r,c);
}

function onKey(e,r,c){
  if(e.key==='Backspace'){
    const inp=getInput(r,c);
    if(inp.value===''){retreatCursor(r,c);}
    else inp.value='';
    e.preventDefault();
  }
  if(e.key==='ArrowRight'){moveFocus(r,c+1);e.preventDefault();}
  if(e.key==='ArrowLeft') {moveFocus(r,c-1);e.preventDefault();}
  if(e.key==='ArrowDown') {moveFocus(r+1,c);e.preventDefault();}
  if(e.key==='ArrowUp')   {moveFocus(r-1,c);e.preventDefault();}
  if(e.key==='Tab'){
    e.preventDefault();
    const words=selDir==='across'?[...ACROSS_WORDS]:[...DOWN_WORDS];
    const idx=words.findIndex(w=>w.id===selWord?.id);
    const next=words[(idx+1)%words.length];
    if(next){selWord=next;const r2=next.row,c2=next.col;highlightSelection(r2,c2);getInput(r2,c2)?.focus();}
  }
}

function advanceCursor(r,c){
  if(!selWord)return;
  const dr=selDir==='across'?0:1, dc=selDir==='across'?1:0;
  const nr=r+dr, nc=c+dc;
  const inp=getInput(nr,nc);
  if(inp){inp.focus();inp.click();}
}
function retreatCursor(r,c){
  if(!selWord)return;
  const dr=selDir==='across'?0:1, dc=selDir==='across'?1:0;
  const nr=r-dr, nc=c-dc;
  const inp=getInput(nr,nc);
  if(inp){inp.value='';inp.focus();}
}
function moveFocus(r,c){const inp=getInput(r,c);if(inp)inp.focus();}

// Build clues panel
function buildClues(words,dir,containerId){
  const box=document.getElementById(containerId);
  box.innerHTML=words.map(w=>`
    <div class="clue-item" id="clue-${dir}-${w.id}" onclick="selectWordById(${w.id},'${dir}')">
      <span class="clue-num-label">${w.id}</span>
      <span class="clue-emoji">${w.emoji}</span>
      <span class="clue-es">${w.es}</span>
      <span class="clue-len">(${w.word.length})</span>
      <button class="speak-clue" onclick="event.stopPropagation();speak('${w.word.replace('TSHIRT','T-SHIRT').toLowerCase()}')" title="Listen">🔊</button>
    </div>`).join('');
}
buildClues(ACROSS_WORDS,'across','acrossClues');
buildClues(DOWN_WORDS,'down','downClues');

function selectWordById(id,dir){
  const words=dir==='across'?ACROSS_WORDS:DOWN_WORDS;
  const w=words.find(x=>x.id===id);
  if(!w)return;
  selWord=w; selDir=dir;
  highlightSelection(w.row,w.col);
  getInput(w.row,w.col)?.focus();
}

// Check / Reveal / Reset
function checkAll(){
  let correct=0,total=0;
  Object.values(inputMap).forEach(inp=>{
    inp.className='';
    const r=parseInt(inp.dataset.r), c=parseInt(inp.dataset.c);
    const expected=cellData[r][c].letter;
    const val=inp.value.toUpperCase();
    if(val){
      total++;
      if(val===expected){inp.className='correct';correct++;}
      else inp.className='wrong';
    }
  });
  const letters=Object.keys(inputMap).length;
  const filled=Object.values(inputMap).filter(i=>i.value).length;
  const msg=document.getElementById('resultMsg');
  if(correct===letters&&filled===letters){
    msg.className='result-msg win';
    msg.textContent='🎉 Perfect! All correct!';
    document.getElementById('finishRow').style.display='flex';
    document.getElementById('scoreDisp').textContent=80;
    speak('Well done! Perfect crossword!');
  } else {
    msg.className='result-msg partial';
    msg.textContent=`${correct} / ${letters} correct — keep going!`;
  }
}

function revealAll(){
  Object.values(inputMap).forEach(inp=>{
    const r=parseInt(inp.dataset.r), c=parseInt(inp.dataset.c);
    inp.value=cellData[r][c].letter;
    inp.className='correct';
  });
  document.getElementById('resultMsg').className='result-msg win';
  document.getElementById('resultMsg').textContent='💡 All revealed!';
  document.getElementById('finishRow').style.display='flex';
}

function resetAll(){
  Object.values(inputMap).forEach(inp=>{inp.value='';inp.className='';});
  document.getElementById('resultMsg').textContent='';
  document.getElementById('finishRow').style.display='none';
  selWord=null;
}

// Speech
function speak(txt){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-GB';u.rate=0.82;u.pitch=1.1;
  speechSynthesis.speak(u);
}

// First cell focus
getInput(0,0)?.focus();
</script>
</body>
</html>
