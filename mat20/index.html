<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Líneas Mágicas — Academia de Magia</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body { background: linear-gradient(135deg,#1a0533 0%,#2d004a 100%) fixed; }
    .hp-header { background: linear-gradient(135deg,#2d004a,#4a0072); border-bottom: 3px solid #FFD700; color: #FFD700; text-shadow: 0 0 12px #a020f0; }
    .hp-header .score-box { background:#4a0072; color:#FFD700; border:1px solid #7c43bd; }
    .level-badge { display:inline-block; background:#4a0072; color:#FFD700; border:2px solid #FFD700; border-radius:20px; padding:4px 18px; font-size:1rem; margin:6px 0; font-family:'Patrick Hand',cursive; }
    .streak-bar { display:flex; gap:6px; justify-content:center; margin:6px 0; }
    .streak-dot { width:18px; height:18px; border-radius:50%; background:#4a0072; border:2px solid #7c43bd; transition:background .3s; }
    .streak-dot.lit { background:#FFD700; border-color:#FFD700; }

    .figure-box {
      background:#fff; border-radius:16px; padding:16px;
      max-width:320px; margin:12px auto;
      box-shadow:0 4px 20px rgba(160,32,240,.35);
      border:3px solid #7c43bd; text-align:center;
    }
    .question-txt { font-size:1.2rem; color:#e1bee7; margin:10px 0 14px; font-family:'Patrick Hand',cursive; text-align:center; }
    .choices { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; }
    .choice { background:#4a0072; color:#FFD700; border:2px solid #7c43bd; border-radius:12px; padding:12px 22px; font-size:1.05rem; font-family:'Patrick Hand',cursive; cursor:pointer; transition:transform .1s, background .1s; text-align:center; line-height:1.4; }
    .choice:hover:not([disabled]) { background:#6a2092; transform:scale(1.04); }
    .choice.ok { background:#2E7D32 !important; border-color:#4CAF50 !important; color:#fff; }
    .choice.no { background:#c62828 !important; border-color:#EF5350 !important; color:#fff; }

    .info-panel {
      background:rgba(255,255,255,.08); border-radius:12px; padding:14px 18px;
      max-width:460px; margin:8px auto; border:2px solid #7c43bd;
      font-family:'Patrick Hand',cursive; font-size:.95rem; color:#e1bee7;
      display:flex; gap:16px; align-items:center; flex-wrap:wrap; justify-content:center;
    }
    .info-panel svg { flex-shrink:0; }
    .info-panel .info-text strong { color:#FFD700; }
    .info-text { max-width:280px; line-height:1.5; }

    .btn-magic { background: linear-gradient(135deg,#7c43bd,#ab47bc); color:#fff; border:none; border-radius:20px; padding:12px 32px; font-size:1.15rem; font-family:'Patrick Hand',cursive; cursor:pointer; box-shadow:0 4px 14px rgba(100,0,200,.4); transition:transform .1s; margin-top:12px; }
    .btn-magic:hover { transform:scale(1.04); }
    #msgBox { min-height:1.6em; font-size:1.05rem; text-align:center; color:#FFD700; margin:8px 0; font-family:'Patrick Hand',cursive; }
    .instruction { color:#e1bee7 !important; }
    .game-area { background:rgba(255,255,255,.04); border:1px solid #4a0072; }
    @keyframes hatPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.3) rotate(8deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
    .hat-anim { position:fixed; top:15%; left:50%; transform:translateX(-50%); font-size:5rem; z-index:999; pointer-events:none; animation:hatPop .7s ease forwards; }
  </style>
</head>
<body>
  <div class="game-header hp-header">
    <h1>📏 Líneas Mágicas</h1>
    <div class="score-box">🧙 <span id="score">0</span></div>
  </div>
  <div class="game-area">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div style="text-align:center">
      <div class="level-badge" id="levelBadge">🎓 Aprendiz</div>
      <div class="streak-bar" id="streakBar"></div>
      <p class="instruction">Observa las líneas y clasifícalas.</p>
    </div>

    <div class="figure-box" id="figureBox"></div>
    <div style="text-align:center">
      <div class="question-txt" id="questionTxt">¿Cómo son estas líneas?</div>
      <div class="choices" id="choiceArea"></div>
    </div>
    <p id="msgBox"></p>
    <div style="text-align:center">
      <button class="btn-magic" id="nextBtn" style="display:none" onclick="nextQ()">✨ Siguiente</button>
    </div>

    <div class="info-panel" id="infoPanel" style="display:none">
      <div class="info-text" id="infoText"></div>
    </div>
  </div>
  <script src="../assets/score.js"></script>
  <script>
  const LEVELS = [
    {name:'🎓 Aprendiz'},{name:'⚡ Mago'},{name:'🌟 Archimago'},{name:'🧙 Brujo Experto'}
  ];
  let levelIdx = parseInt(sessionStorage.getItem('mat20_level')||'0');
  let streak = 0, totalScore = 0;
  const STREAK_NEEDED = 3;
  const MAX_QUESTIONS = 12;
  let questionCount = 0;
  let correctAnswer = '';

  function rnd(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
  function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];} }

  // ── SVG line builders ─────────────────────────────────────────────────────────
  const W=260, H=200;

  function svgParalelas() {
    // Two truly parallel lines with random slope
    const slopes = [0, 15, 30, -20, -35];
    const angle = slopes[rnd(0,slopes.length-1)];
    const dx = Math.cos(angle*Math.PI/180)*120;
    const dy = Math.sin(angle*Math.PI/180)*120;
    const cx=W/2, cy=H/2;
    const gap = rnd(30,55);
    // Two lines offset perpendicularly
    const nx = Math.sin(angle*Math.PI/180), ny = -Math.cos(angle*Math.PI/180);
    return `<svg width="${W}" height="${H}">
      <line x1="${cx-dx+nx*gap}" y1="${cy-dy+ny*gap}" x2="${cx+dx+nx*gap}" y2="${cy+dy+ny*gap}" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
      <line x1="${cx-dx-nx*gap}" y1="${cy-dy-ny*gap}" x2="${cx+dx-nx*gap}" y2="${cy+dy-ny*gap}" stroke="#e53935" stroke-width="3" stroke-linecap="round"/>
    </svg>`;
  }

  function svgSecantes() {
    // Two lines that cross somewhere in the middle
    const cx=W/2, cy=H/2;
    const a1 = rnd(20,70), a2 = rnd(-70,-20);
    function linePoints(angle, len=115) {
      const r=angle*Math.PI/180;
      return [cx-Math.cos(r)*len, cy-Math.sin(r)*len, cx+Math.cos(r)*len, cy+Math.sin(r)*len];
    }
    const [x1,y1,x2,y2]=linePoints(a1);
    const [x3,y3,x4,y4]=linePoints(a2);
    return `<svg width="${W}" height="${H}">
      <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
      <line x1="${x3}" y1="${y3}" x2="${x4}" y2="${y4}" stroke="#e53935" stroke-width="3" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="6" fill="#e65100"/>
    </svg>`;
  }

  function svgPerpendiculares() {
    const cx=W/2, cy=H/2;
    const len=105;
    const angle = rnd(0,3)*45; // 0, 45, 90, 135 deg base
    const r=angle*Math.PI/180;
    const x1=cx-Math.cos(r)*len, y1=cy-Math.sin(r)*len;
    const x2=cx+Math.cos(r)*len, y2=cy+Math.sin(r)*len;
    const r2=r+Math.PI/2;
    const x3=cx-Math.cos(r2)*len, y3=cy-Math.sin(r2)*len;
    const x4=cx+Math.cos(r2)*len, y4=cy+Math.sin(r2)*len;
    // Small square at intersection
    const sq=10;
    const sq1x=cx+Math.cos(r)*sq, sq1y=cy+Math.sin(r)*sq;
    const sq2x=cx+Math.cos(r2)*sq, sq2y=cy+Math.sin(r2)*sq;
    const sq3x=sq1x+Math.cos(r2)*sq, sq3y=sq1y+Math.sin(r2)*sq;
    return `<svg width="${W}" height="${H}">
      <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
      <line x1="${x3}" y1="${y3}" x2="${x4}" y2="${y4}" stroke="#e53935" stroke-width="3" stroke-linecap="round"/>
      <polyline points="${sq1x},${sq1y} ${sq3x},${sq3y} ${sq2x},${sq2y}" fill="none" stroke="#555" stroke-width="1.5"/>
    </svg>`;
  }

  const TIPO_INFO = {
    'Paralelas':        '🔵🔴 <strong>Paralelas</strong>: van en la misma dirección y nunca se cruzan, como los raíles de un tren.',
    'Secantes':         '🔵🔴 <strong>Secantes</strong>: se cruzan en un punto.',
    'Perpendiculares':  '🔵🔴 <strong>Perpendiculares</strong>: se cruzan formando un ángulo recto (90°). Son un caso especial de secantes.',
  };

  function genQuestion() {
    questionCount++;
    document.getElementById('progressBar').style.width = (questionCount / MAX_QUESTIONS * 100) + '%';
    // L0: solo paralelas/secantes
    // L1: también perpendiculares (identificar)
    // L2+: mixed + perpendiculares como opción extra
    let tipo, svg, choices;
    if(levelIdx < 1) {
      tipo = rnd(0,1) ? 'Paralelas' : 'Secantes';
      choices = ['Paralelas','Secantes'];
    } else {
      const tipos = ['Paralelas','Secantes','Perpendiculares'];
      tipo = tipos[rnd(0,2)];
      choices = [...tipos]; shuffle(choices);
    }
    if(tipo==='Paralelas') svg = svgParalelas();
    else if(tipo==='Secantes') svg = svgSecantes();
    else svg = svgPerpendiculares();

    correctAnswer = tipo;
    if(choices.length===2) {
      const c=[...choices]; shuffle(c);
      document.getElementById('choiceArea').innerHTML = c.map(ch=>
        `<button class="choice" onclick="pick(this,'${ch}')">${ch}</button>`).join('');
    } else {
      document.getElementById('choiceArea').innerHTML = choices.map(ch=>
        `<button class="choice" onclick="pick(this,'${ch}')">${ch}</button>`).join('');
    }
    document.getElementById('figureBox').innerHTML = svg;
    document.getElementById('infoPanel').style.display = 'none';
  }

  function pick(btn, val) {
    document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
    document.getElementById('infoPanel').style.display='flex';
    document.getElementById('infoText').innerHTML = TIPO_INFO[correctAnswer];
    if(val===correctAnswer) {
      btn.classList.add('ok');
      totalScore += (levelIdx+1)*10; streak++;
      document.getElementById('score').textContent = totalScore;
      showHat(); updateStreak();
      if(streak>=STREAK_NEEDED && levelIdx<3) {
        levelIdx++; streak=0;
        sessionStorage.setItem('mat20_level', levelIdx);
        document.getElementById('msgBox').textContent=`✨ ¡Subiste de nivel! Ahora eres ${LEVELS[levelIdx].name}`;
        updateLevelBadge();
      } else {
        document.getElementById('msgBox').textContent=['¡Perfecto! 🎉','¡Excelente! ⚡','¡Brillante! 🌟','¡Mágico! 🧙'][levelIdx];
      }
    } else {
      btn.classList.add('no'); streak=0; updateStreak(); Sound.wrong();
      document.querySelectorAll('.choice').forEach(b=>{ if(b.textContent===correctAnswer) b.classList.add('ok'); });
      document.getElementById('msgBox').textContent=`😕 Era: ${correctAnswer}`;
    }
    document.getElementById('nextBtn').style.display='inline-block';
  }

  function nextQ() {
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('msgBox').textContent='';
    if(questionCount >= MAX_QUESTIONS) {
      maybePodio('mat20', totalScore, MAX_QUESTIONS * 10);
    } else {
      genQuestion();
    }
  }

  function showHat() {
    Sound.fanfare();
    const h=document.createElement('div'); h.className='hat-anim';
    h.textContent=['🧢','🎩','🪄','🧙'][levelIdx];
    document.body.appendChild(h); setTimeout(()=>h.remove(),900);
  }
  function updateLevelBadge() { document.getElementById('levelBadge').textContent=LEVELS[levelIdx].name; }
  function updateStreak() {
    document.getElementById('streakBar').innerHTML=Array.from({length:STREAK_NEEDED},(_,i)=>
      `<div class="streak-dot ${i<streak?'lit':''}"></div>`).join('');
  }

  updateLevelBadge(); updateStreak(); genQuestion();
  </script>
</body>
</html>
