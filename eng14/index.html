<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎪 Fun at Camp — Story</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#0d1b2a,#1b2a3b) fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.top-bar{width:100%;max-width:660px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.back-btn{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:14px;padding:5px 14px;font-family:inherit;font-size:.9rem;cursor:pointer;text-decoration:none}
.back-btn:hover{background:#2979ff}
.score-box{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:20px;padding:4px 16px;font-size:1rem}
.phase-bar{display:flex;gap:6px;margin:6px 0 14px;flex-wrap:wrap;justify-content:center}
.p-tab{padding:6px 16px;border-radius:20px;font-family:inherit;font-size:.88rem;border:2px solid #2979ff;background:#0d1b2a;color:#7eb3ff;cursor:default}
.p-tab.active{background:#2979ff;color:#fff;font-weight:bold}
.p-tab.done{background:#1b5e20;border-color:#4CAF50;color:#fff}
.phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:660px;padding:0 12px}
.phase.active{display:flex}
.ph-title{font-size:1.05rem;color:#90caf9;text-align:center;margin-bottom:10px}
.fb{min-height:2rem;font-size:1.05rem;text-align:center;margin:8px 0}
.fb.ok{color:#69f0ae}.fb.no{color:#ff5252}
.btn-go{background:linear-gradient(135deg,#1b5e20,#388E3C);color:#FFD700;border:2px solid #FFD700;border-radius:20px;padding:9px 28px;font-family:inherit;font-size:1rem;cursor:pointer;margin-top:8px}
.btn-go:hover{background:#4CAF50}.btn-go:disabled{opacity:.35;cursor:default}
.flash-ov{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:50}
.flash-ov.g{background:rgba(76,175,80,.2);opacity:1}
.flash-ov.r{background:rgba(244,67,54,.2);opacity:1}
/* Learn */
.learn-dots{display:flex;gap:7px;justify-content:center;margin-bottom:10px}
.l-dot{width:12px;height:12px;border-radius:50%;background:#1a3a5c;border:2px solid #2979ff}
.l-dot.cur{background:#FFD700}.l-dot.seen{background:#42a5f5}
.phrase-card{width:100%;background:linear-gradient(145deg,#0f2040,#1a3a5c);border:3px solid #2979ff;border-radius:24px;padding:22px 18px;box-shadow:0 8px 28px rgba(41,121,255,.3)}
.phrase-scene{font-size:3.5rem;text-align:center;margin-bottom:6px}
.dlg-exchange{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.dlg-row{display:flex;gap:8px;align-items:flex-start}
.dlg-row.r{justify-content:flex-end}
.dlg-avatar{font-size:1.8rem;flex-shrink:0}
.dlg-bubble{border-radius:16px;padding:9px 14px;font-size:1.1rem;font-weight:bold;line-height:1.4;max-width:78%}
.dlg-bubble.a{background:linear-gradient(135deg,#1565c0,#0d47a1);border:2px solid #42a5f5;border-bottom-left-radius:4px}
.dlg-bubble.b{background:linear-gradient(135deg,#4a148c,#6a1b9a);border:2px solid #ce93d8;border-bottom-right-radius:4px}
.dlg-bubble.c{background:linear-gradient(135deg,#1b5e20,#2e7d32);border:2px solid #69f0ae;border-bottom-left-radius:4px}
.phrase-es{font-size:.9rem;color:#90caf9;font-style:italic;text-align:center;margin-top:6px}
.learn-nav{display:flex;align-items:center;gap:16px;margin:12px 0 6px;justify-content:center}
.nav-btn{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:50%;width:44px;height:44px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#2979ff}.nav-btn:disabled{opacity:.3;cursor:default}
.spk-btn{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:2px solid #42a5f5;border-radius:20px;padding:7px 22px;font-family:inherit;font-size:.95rem;cursor:pointer}
/* Quiz */
.q-box{width:100%;background:linear-gradient(145deg,#0f2040,#1a3a5c);border:3px solid #FFD700;border-radius:18px;padding:16px;margin-bottom:10px}
.q-scene{font-size:3rem;text-align:center;margin-bottom:6px}
.q-said{background:rgba(0,0,0,.3);border:2px solid #2979ff;border-radius:14px;padding:10px 14px;font-size:1.2rem;font-weight:bold;color:#FFD700;text-align:center;margin-bottom:8px}
.q-prog{font-size:.85rem;color:#90caf9;text-align:center}
.opt-grid{display:grid;grid-template-columns:1fr;gap:8px;width:100%}
.opt-btn{background:linear-gradient(145deg,#0f1f35,#18304e);border:2px solid #2979ff;border-radius:14px;padding:12px 14px;cursor:pointer;font-family:inherit;font-size:1rem;color:#fff;font-weight:bold;transition:transform .1s;text-align:left}
.opt-btn:hover:not([disabled]){transform:scale(1.02);border-color:#90caf9}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{border-color:#69f0ae!important;background:rgba(105,240,174,.2)!important;color:#69f0ae!important}
.opt-btn.wrong{opacity:.3!important;border-color:#f44336!important;text-decoration:line-through}
/* Fill */
.fill-card{width:100%;background:linear-gradient(145deg,#0f1f35,#18304e);border:3px solid #2979ff;border-radius:20px;padding:18px;margin-bottom:10px}
.fill-scene{font-size:3rem;text-align:center;margin-bottom:8px}
.fill-said{background:rgba(41,121,255,.15);border:2px solid #2979ff;border-radius:14px;padding:10px 14px;font-size:1.3rem;font-weight:bold;color:#fff;text-align:center;margin-bottom:14px;line-height:1.5}
.blank{display:inline-block;min-width:120px;border-bottom:3px solid #42a5f5;color:#FFD700;font-weight:bold;padding:0 4px}
.fill-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-btn{padding:14px 6px;border-radius:14px;border:none;font-family:inherit;font-size:.95rem;font-weight:bold;color:#fff;cursor:pointer;transition:transform .1s}
.f-btn:hover:not([disabled]){transform:scale(1.04)}.f-btn:disabled{cursor:default}
.f-btn.correct{outline:4px solid #FFD700!important;box-shadow:0 0 14px rgba(255,215,0,.5)!important}
.f-btn.wrong{opacity:.3;text-decoration:line-through}
.fin{background:#0a2010;border:2px solid #4CAF50;border-radius:16px;padding:22px;text-align:center;width:100%}
.recommend{margin-top:12px;background:rgba(255,215,0,.08);border:2px solid #FFD700;border-radius:14px;padding:12px;font-size:.98rem;line-height:1.6}
</style>
</head>
<body>
<div class="flash-ov" id="fov"></div>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← Home</a>
  <span style="color:#FFD700;font-size:1.05rem">🎪 Fun at Camp</span>
  <div class="score-box">⭐ <span id="scoreDisp">0</span></div>
</div>
<div class="phase-bar">
  <div class="p-tab active" id="tab1">📖 Learn</div>
  <div class="p-tab" id="tab2">🔗 Match</div>
  <div class="p-tab" id="tab3">✍️ Fill In</div>
</div>

<!-- Phase 1: Learn key phrases -->
<div class="phase active" id="phase1">
  <p class="ph-title">Learn the key phrases from the story! 🎪</p>
  <div class="learn-dots" id="lDots"></div>
  <div class="phrase-card" id="lCard"></div>
  <div class="learn-nav">
    <button class="nav-btn" id="lP" onclick="lcMove(-1)">◀</button>
    <span style="color:#90caf9;font-size:.9rem" id="lCnt">1 / 5</span>
    <button class="nav-btn" id="lN" onclick="lcMove(1)">▶</button>
  </div>
  <button class="spk-btn" onclick="speakCard()">🔊 Listen</button>
  <div class="fb" id="fb1"></div>
  <button class="btn-go" id="btn1" onclick="goTab(2)" disabled>🔗 Start Matching! →</button>
</div>

<!-- Phase 2: match question → answer -->
<div class="phase" id="phase2">
  <p class="ph-title">Choose the correct reply! 🔗</p>
  <div class="q-box">
    <div class="q-scene" id="q2Scene"></div>
    <div class="q-said" id="q2Said"></div>
    <div class="q-prog" id="q2Prog">Question 1 of 8</div>
  </div>
  <div class="opt-grid" id="q2Grid"></div>
  <div class="fb" id="fb2"></div>
</div>

<!-- Phase 3: fill in the blank -->
<div class="phase" id="phase3">
  <p class="ph-title">Complete the sentence! Pick the missing word! ✍️</p>
  <div class="fill-card">
    <div class="fill-scene" id="f3Scene"></div>
    <div class="fill-said" id="f3Said"></div>
    <div class="fill-btns" id="f3Btns"></div>
  </div>
  <div style="font-size:.85rem;color:#90caf9;margin-bottom:4px" id="f3Prog">Sentence 1 of 8</div>
  <div class="fb" id="fb3"></div>
  <div class="fin" id="fin" style="display:none">
    <div style="font-size:3rem">🎉</div>
    <div style="font-size:1.4rem;color:#69f0ae;font-weight:bold;margin:8px 0">Story master!</div>
    <div style="color:#90caf9">Score: <strong style="color:#FFD700" id="finSc"></strong> ⭐</div>
    <div class="recommend" id="recommend"></div>
    <a href="../index.html" style="display:inline-block;margin-top:14px;padding:10px 28px;background:#FFD700;color:#0d1b2a;border-radius:20px;font-weight:bold;text-decoration:none;font-family:inherit">🏠 Home</a>
  </div>
</div>

<script>
const LEARN_PHRASES = [
  {
    scene:'⛵',
    exchange:[
      {av:'👦',side:'a',text:'I want to sail a boat.'},
      {av:'👧',side:'b',text:'I want to climb a tree.'},
    ],
    es:'"Quiero navegar en un barco." — "Quiero trepar a un árbol."'
  },
  {
    scene:'🔵',
    exchange:[
      {av:'👦',side:'a',text:'Can you help me, please?'},
      {av:'🐿️',side:'c',text:'Yes, I can.'},
    ],
    es:'"¿Puedes ayudarme, por favor?" — "Sí, puedo."'
  },
  {
    scene:'🏐',
    exchange:[
      {av:'👦',side:'a',text:"I don't want to swim. I want to try the zorb ball!"},
      {av:'👧',side:'b',text:"I don't want to play volleyball. I want to try the zorb ball!"},
    ],
    es:'"No quiero nadar. ¡Quiero probar el zorb ball!" — "No quiero jugar al voleibol. ¡Quiero probar el zorb ball!"'
  },
  {
    scene:'🏕️',
    exchange:[
      {av:'👦',side:'a',text:'Whose turn is it now?'},
      {av:'👧',side:'c',text:"It's your turn, Grace."},
    ],
    es:'"¿A quién le toca ahora?" — "Te toca a ti, Grace."'
  },
  {
    scene:'⛵',
    exchange:[
      {av:'👦',side:'a',text:"I can't stop the boat!"},
    ],
    es:'"¡No puedo parar el barco!"'
  },
];

const Q2_DATA = [
  { scene:'❓',said:'Can you help me, please?', correct:'Yes, I can.', wrong:["Yes, I can't.",'Yes, I want to.','No, thank you.'] },
  { scene:'🏕️',said:'Whose turn is it?',       correct:"It's your turn.",wrong:["It's my turn now.",'Your turn is it.','It is you turn.'] },
  { scene:'⛵',said:'I want to sail a boat.',   correct:'I want to climb a tree.',wrong:["I can't sail a boat.",'I want to swim.','I don\'t want to sail.'] },
  { scene:'🔵',said:"I don't want to swim.",   correct:'I want to try the zorb ball!',wrong:['I want to swim.','I want to play volleyball.','I can\'t swim.'] },
  { scene:'❓',said:'Can you help me, please?', correct:'Yes, I can.', wrong:["No, I can't.",'No, thank you.','Yes, you can.'] },
  { scene:'🏕️',said:'Whose turn is it now?',   correct:"It's your turn, Grace.",wrong:["It's my turn, Grace.",'Grace is your turn.','Your turn is Grace.'] },
  { scene:'⛵',said:"I can't stop the boat!",  correct:'Can you help me, please?',wrong:['I want to stop the boat.','I don\'t want to stop.','Help the boat, please!'] },
  { scene:'🏐',said:"I don't want to play volleyball.", correct:'I want to try the zorb ball!',wrong:['I want to play volleyball.','I don\'t want to try.','I want to swim.'] },
];

const FILL_Q = [
  { scene:'🔵',said:'Can you ___ me, please?',   correct:'help',   opts:['help','want','try','stop'] },
  { scene:'✅',said:'Yes, I ___.',                correct:'can',    opts:['can','want','help','stop'] },
  { scene:'🏕️',said:"It's ___ turn, Grace.",     correct:'your',   opts:['your','my','their','her'] },
  { scene:'⛵',said:"I can't ___ the boat!",     correct:'stop',   opts:['stop','help','want','try'] },
  { scene:'🔵',said:"I don't ___ to swim.",      correct:'want',   opts:['want','can','help','stop'] },
  { scene:'🏐',said:'I want to ___ the zorb ball!',correct:'try',  opts:['try','stop','help','want'] },
  { scene:'❓', said:'___ you help me, please?', correct:'Can',    opts:['Can','Do','Want','Will'] },
  { scene:'🏕️',said:"Whose ___ is it now?",     correct:'turn',   opts:['turn','time','play','go'] },
];

let score=0,lcIdx=0,lcSeen=new Set();
let q2Order=[],q2N=0,q2OK=0;
let f3Order=[],f3N=0,f3OK=0;
const COLORS=['#1b5e20','#7f0000','#1565c0','#6a1b9a'];

const upScore=n=>{score+=n;document.getElementById('scoreDisp').textContent=score;};
const flash=ok=>{const e=document.getElementById('fov');e.className='flash-ov '+(ok?'g':'r');setTimeout(()=>e.className='flash-ov',300);};
const speak=t=>{const u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);};
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};

function goTab(n){
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.getElementById('phase'+n).classList.add('active');
  document.querySelectorAll('.p-tab').forEach((t,i)=>{t.classList.remove('active','done');if(i+1<n)t.classList.add('done');});
  document.getElementById('tab'+n).classList.add('active');
  if(n===2)initQ2();
  if(n===3)initF3();
}

function lcRender(){
  const p=LEARN_PHRASES[lcIdx];
  const rows=p.exchange.map(e=>`
    <div class="dlg-row${e.side==='b'?' r':''}">
      ${e.side!=='b'?`<div class="dlg-avatar">${e.av}</div>`:''}
      <div class="dlg-bubble ${e.side}">${e.text}</div>
      ${e.side==='b'?`<div class="dlg-avatar">${e.av}</div>`:''}
    </div>`).join('');
  document.getElementById('lCard').innerHTML=`
    <div class="phrase-scene">${p.scene}</div>
    <div class="dlg-exchange">${rows}</div>
    <div class="phrase-es">${p.es}</div>`;
  document.getElementById('lCnt').textContent=(lcIdx+1)+' / '+LEARN_PHRASES.length;
  document.getElementById('lP').disabled=lcIdx===0;
  document.getElementById('lN').disabled=lcIdx===LEARN_PHRASES.length-1;
  lcSeen.add(lcIdx);
  document.getElementById('lDots').innerHTML=LEARN_PHRASES.map((_,i)=>`<div class="l-dot${i===lcIdx?' cur':lcSeen.has(i)?' seen':''}"></div>`).join('');
  if(lcSeen.size===LEARN_PHRASES.length){
    document.getElementById('btn1').disabled=false;
    document.getElementById('fb1').className='fb ok';document.getElementById('fb1').textContent='✅ All seen! Ready to practise!';
  }
}
function lcMove(d){lcIdx=Math.max(0,Math.min(LEARN_PHRASES.length-1,lcIdx+d));lcRender();}
function speakCard(){
  const p=LEARN_PHRASES[lcIdx];
  const text=p.exchange.map(e=>e.text).join('. ');
  speak(text);
}
lcRender();

function initQ2(){q2N=0;q2OK=0;q2Order=shuffle(Q2_DATA.map((_,i)=>i));nextQ2();}
function nextQ2(){
  if(q2N>=Q2_DATA.length){
    document.getElementById('tab2').classList.add('done');
    document.getElementById('fb2').className='fb ok';
    document.getElementById('fb2').innerHTML='🎉 '+q2OK+'/'+Q2_DATA.length+' correct!';
    setTimeout(()=>goTab(3),1400);return;
  }
  const d=Q2_DATA[q2Order[q2N]];
  document.getElementById('q2Scene').textContent=d.scene;
  document.getElementById('q2Said').textContent='"'+d.said+'"';
  document.getElementById('q2Prog').textContent='Question '+(q2N+1)+' of '+Q2_DATA.length;
  const opts=shuffle([d.correct,...shuffle(d.wrong).slice(0,2)]);
  document.getElementById('q2Grid').innerHTML=opts.map(o=>
    `<button class="opt-btn" data-opt="${o.replace(/"/g,'&quot;')}" onclick="checkQ2(this)">"${o}"</button>`).join('');
  document.getElementById('fb2').textContent='';
  document.getElementById('q2Grid').dataset.correct=d.correct;
}
function checkQ2(btn){
  const correct=document.getElementById('q2Grid').dataset.correct;
  document.querySelectorAll('#q2Grid .opt-btn').forEach(b=>b.disabled=true);
  const ok=btn.dataset.opt===correct;
  if(ok){btn.classList.add('correct');q2OK++;upScore(10);flash(true);
    document.getElementById('fb2').className='fb ok';document.getElementById('fb2').textContent='✅ '+correct;
    speak(correct);
  }else{btn.classList.add('wrong');
    document.querySelectorAll('#q2Grid .opt-btn').forEach(b=>{if(b.dataset.opt===correct)b.classList.add('correct');});
    flash(false);document.getElementById('fb2').className='fb no';document.getElementById('fb2').textContent='❌ '+correct;
  }
  q2N++;setTimeout(nextQ2,1800);
}

function initF3(){f3N=0;f3OK=0;f3Order=shuffle(FILL_Q.map((_,i)=>i));nextF3();}
function nextF3(){
  if(f3N>=FILL_Q.length){
    document.getElementById('fin').style.display='block';
    document.getElementById('finSc').textContent=score;
    showRecommend(q2OK+f3OK,Q2_DATA.length+FILL_Q.length);
    return;
  }
  const q=FILL_Q[f3Order[f3N]];
  document.getElementById('f3Scene').textContent=q.scene;
  document.getElementById('f3Said').innerHTML='"'+q.said.replace('___','<span class="blank">___</span>')+'"';
  document.getElementById('f3Prog').textContent='Sentence '+(f3N+1)+' of '+FILL_Q.length;
  const opts=shuffle(q.opts.slice(0,4));
  document.getElementById('f3Btns').innerHTML=opts.map((o,i)=>
    `<button class="f-btn" style="background:${COLORS[i%4]}" data-opt="${o}" onclick="checkF3(this,'${q.correct}')">${o}</button>`).join('');
  document.getElementById('fb3').textContent='';
}
function checkF3(btn,correct){
  document.querySelectorAll('#f3Btns .f-btn').forEach(b=>b.disabled=true);
  const ok=btn.dataset.opt===correct;
  const q=FILL_Q[f3Order[f3N]];
  const full=q.said.replace('___',correct);
  if(ok){btn.classList.add('correct');f3OK++;upScore(10);flash(true);
    document.getElementById('f3Said').innerHTML='"'+full.replace(correct,`<span style="color:#69f0ae;font-weight:bold">${correct}</span>`)+'"';
    document.getElementById('fb3').className='fb ok';document.getElementById('fb3').textContent='✅ Correct!';
    speak(full);
  }else{btn.classList.add('wrong');
    document.querySelectorAll('#f3Btns .f-btn').forEach(b=>{if(b.dataset.opt===correct)b.classList.add('correct');});
    flash(false);
    document.getElementById('f3Said').innerHTML='"'+full.replace(correct,`<span style="color:#69f0ae;font-weight:bold">${correct}</span>`)+'"';
    document.getElementById('fb3').className='fb no';document.getElementById('fb3').textContent='❌ "'+full+'"';
  }
  f3N++;setTimeout(nextF3,1800);
}

function showRecommend(ok,total){
  const pct=Math.round(ok/total*100);
  const el=document.getElementById('recommend');
  if(pct>=80)el.innerHTML=`<b style="color:#69f0ae">Excellent! ${pct}%</b><br>You know the story phrases perfectly! 🌟`;
  else if(pct>=60)el.innerHTML=`<b style="color:#FFD700">Good! ${pct}%</b><br>Review: <em>Can you help me, please? / Yes, I can. / Whose turn is it? / It's your turn.</em> 📖`;
  else el.innerHTML=`<b style="color:#ff5252">Keep practising! ${pct}%</b><br>Study: ❓ Can you help me? ✅ Yes, I can. 🔄 Whose turn is it? → It's your turn. 💪`;
}
</script>
</body>
</html>
