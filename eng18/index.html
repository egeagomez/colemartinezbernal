<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏗️ Natural Structures</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#0d1b2a,#1b2a3b) fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.top-bar{width:100%;max-width:660px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.back-btn{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:14px;padding:5px 14px;font-family:inherit;font-size:.9rem;cursor:pointer;text-decoration:none}
.back-btn:hover{background:#2979ff}
.score-box{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:20px;padding:4px 16px;font-size:1rem}
.phase-bar{display:flex;gap:6px;margin:6px 0 14px;flex-wrap:wrap;justify-content:center}
.p-tab{padding:6px 16px;border-radius:20px;font-family:inherit;font-size:.88rem;border:2px solid #2979ff;background:#0d1b2a;color:#7eb3ff;cursor:default}
.p-tab.active{background:#2979ff;color:#fff;font-weight:bold}
.p-tab.done{background:#1b5e20;border-color:#4CAF50;color:#fff}
.phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:660px;padding:0 12px}
.phase.active{display:flex}
.ph-title{font-size:1.05rem;color:#90caf9;text-align:center;margin-bottom:10px}
.fb{min-height:2rem;font-size:1.05rem;text-align:center;margin:8px 0}
.fb.ok{color:#69f0ae}.fb.no{color:#ff5252}
.btn-go{background:linear-gradient(135deg,#1b5e20,#388E3C);color:#FFD700;border:2px solid #FFD700;border-radius:20px;padding:9px 28px;font-family:inherit;font-size:1rem;cursor:pointer;margin-top:8px}
.btn-go:hover{background:#4CAF50}.btn-go:disabled{opacity:.35;cursor:default}
.flash-ov{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:50}
.flash-ov.g{background:rgba(76,175,80,.2);opacity:1}
.flash-ov.r{background:rgba(244,67,54,.2);opacity:1}
.learn-dots{display:flex;gap:7px;justify-content:center;margin-bottom:10px}
.l-dot{width:12px;height:12px;border-radius:50%;background:#1a3a5c;border:2px solid #2979ff}
.l-dot.cur{background:#FFD700}.l-dot.seen{background:#42a5f5}
.learn-card{width:100%;background:linear-gradient(145deg,#0f2040,#1a3a5c);border:3px solid #2979ff;border-radius:24px;padding:28px 20px;text-align:center;box-shadow:0 8px 28px rgba(41,121,255,.3)}
.lc-em{font-size:4.5rem;display:block;margin:6px 0}
.lc-word{font-size:2.2rem;font-weight:bold;color:#fff;margin:6px 0}
.lc-es{font-size:1.1rem;color:#90caf9;font-style:italic;margin-top:4px}
.lc-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.9rem;font-weight:bold;margin-top:10px}
.lc-tag.nat{background:rgba(105,240,174,.2);border:2px solid #69f0ae;color:#69f0ae}
.lc-tag.art{background:rgba(255,215,0,.15);border:2px solid #FFD700;color:#FFD700}
.learn-nav{display:flex;align-items:center;gap:16px;margin:12px 0 6px;justify-content:center}
.nav-btn{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:50%;width:44px;height:44px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#2979ff}.nav-btn:disabled{opacity:.3;cursor:default}
.spk-btn{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:2px solid #42a5f5;border-radius:20px;padding:7px 22px;font-family:inherit;font-size:.95rem;cursor:pointer}
.q-box{width:100%;background:linear-gradient(145deg,#0f2040,#1a3a5c);border:3px solid #FFD700;border-radius:18px;padding:20px;text-align:center;margin-bottom:10px}
.q-em{font-size:4rem;display:block;margin-bottom:6px}
.q-prog{font-size:.85rem;color:#90caf9;margin-top:6px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.opt-btn{background:linear-gradient(145deg,#0f1f35,#18304e);border:2px solid #2979ff;border-radius:14px;padding:13px 8px;cursor:pointer;font-family:inherit;font-size:.95rem;color:#fff;font-weight:bold;transition:transform .1s;line-height:1.3}
.opt-btn:hover:not([disabled]){transform:scale(1.04);border-color:#90caf9}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{border-color:#69f0ae!important;background:rgba(105,240,174,.2)!important;color:#69f0ae!important}
.opt-btn.wrong{opacity:.3!important;border-color:#f44336!important;text-decoration:line-through}
.na-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.na-btn{border:3px solid;border-radius:16px;padding:18px 8px;cursor:pointer;font-family:inherit;font-size:1.05rem;font-weight:bold;color:#fff;transition:transform .12s}
.na-btn.nat-s{border-color:#69f0ae;background:linear-gradient(145deg,#0a2a14,#1a4a24)}
.na-btn.art-s{border-color:#FFD700;background:linear-gradient(145deg,#2a1a00,#4a3000)}
.na-btn:hover:not([disabled]){transform:scale(1.05)}.na-btn:disabled{cursor:default;opacity:.5}
.na-btn.correct{outline:4px solid #FFD700;box-shadow:0 0 16px rgba(255,215,0,.5);opacity:1!important}
.na-btn.wrong{opacity:.25!important;text-decoration:line-through}
.fin{background:#0a2010;border:2px solid #4CAF50;border-radius:16px;padding:22px;text-align:center;width:100%}
.recommend{margin-top:12px;background:rgba(255,215,0,.08);border:2px solid #FFD700;border-radius:14px;padding:12px;font-size:.95rem;line-height:1.6}
</style>
</head>
<body>
<div class="flash-ov" id="fov"></div>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← Home</a>
  <span style="color:#FFD700;font-size:1.05rem">🏗️ Natural Structures</span>
  <div class="score-box">⭐ <span id="scoreDisp">0</span></div>
</div>
<div class="phase-bar">
  <div class="p-tab active" id="tab1">📖 Learn</div>
  <div class="p-tab" id="tab2">🔍 Match</div>
  <div class="p-tab" id="tab3">🌿 Sort!</div>
</div>

<!-- Phase 1: Flashcards -->
<div class="phase active" id="phase1">
  <p class="ph-title">Learn the structures vocabulary! 🏗️</p>
  <div class="learn-dots" id="lDots"></div>
  <div class="learn-card" id="lCard"></div>
  <div class="learn-nav">
    <button class="nav-btn" id="lP" onclick="lcMove(-1)">◀</button>
    <span style="color:#90caf9;font-size:.9rem" id="lCnt">1 / 8</span>
    <button class="nav-btn" id="lN" onclick="lcMove(1)">▶</button>
  </div>
  <button class="spk-btn" onclick="speakCard()">🔊 Listen</button>
  <div class="fb" id="fb1"></div>
  <button class="btn-go" id="btn1" onclick="goTab(2)" disabled>🔍 Start Matching! →</button>
</div>

<!-- Phase 2: Emoji → Word quiz -->
<div class="phase" id="phase2">
  <p class="ph-title">What structure is this? 🔍</p>
  <div class="q-box">
    <span class="q-em" id="q2Em"></span>
    <div class="q-prog" id="q2Prog">Question 1 of 8</div>
  </div>
  <div class="opt-grid" id="q2Grid"></div>
  <div class="fb" id="fb2"></div>
</div>

<!-- Phase 3: Natural or Artificial sort -->
<div class="phase" id="phase3">
  <p class="ph-title">Natural 🌿 or Artificial 🔧?</p>
  <div class="q-box">
    <span class="q-em" id="q3Em"></span>
    <div style="font-size:1.6rem;font-weight:bold;color:#FFD700;margin:8px 0" id="q3Word"></div>
    <div class="q-prog" id="q3Prog">Word 1 of 8</div>
  </div>
  <div class="na-grid">
    <button class="na-btn nat-s" id="btnNat" onclick="checkSort(true)">🌿 Natural</button>
    <button class="na-btn art-s" id="btnArt" onclick="checkSort(false)">🔧 Artificial</button>
  </div>
  <div class="fb" id="fb3"></div>
  <div class="fin" id="fin" style="display:none">
    <div style="font-size:3rem">🌟</div>
    <div style="font-size:1.4rem;color:#69f0ae;font-weight:bold;margin:8px 0">Structures Expert!</div>
    <div style="color:#90caf9">Score: <strong style="color:#FFD700" id="finSc"></strong> ⭐</div>
    <div class="recommend" id="recommend"></div>
    <a href="../index.html" style="display:inline-block;margin-top:14px;padding:10px 28px;background:#FFD700;color:#0d1b2a;border-radius:20px;font-weight:bold;text-decoration:none;font-family:inherit">🏠 Home</a>
  </div>
</div>

<script>
const VOCAB = [
  { word:'nest',       em:'🪺', es:'nido',               natural:true  },
  { word:'beaver dam', em:'🦫', es:'presa de castor',    natural:true  },
  { word:'tree trunk', em:'🪵', es:'tronco de árbol',    natural:true  },
  { word:'shell',      em:'🐚', es:'concha / caparazón', natural:true  },
  { word:'cave',       em:'🏔️', es:'cueva',              natural:true  },
  { word:'skeleton',   em:'💀', es:'esqueleto',          natural:true  },
  { word:'bridge',     em:'🌉', es:'puente',             natural:false },
  { word:'ladder',     em:'🪜', es:'escalera',           natural:false },
];

let score=0, lcIdx=0, lcSeen=new Set();
let q2Order=[], q2N=0, q2OK=0;
let q3Order=[], q3N=0, q3OK=0;

const upScore=n=>{score+=n;document.getElementById('scoreDisp').textContent=score;};
const flash=ok=>{const e=document.getElementById('fov');e.className='flash-ov '+(ok?'g':'r');setTimeout(()=>e.className='flash-ov',300);};
const speak=t=>{const u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);};
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};

function goTab(n){
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.getElementById('phase'+n).classList.add('active');
  document.querySelectorAll('.p-tab').forEach((t,i)=>{t.classList.remove('active','done');if(i+1<n)t.classList.add('done');});
  document.getElementById('tab'+n).classList.add('active');
  if(n===2)initQ2();
  if(n===3)initQ3();
}

function lcRender(){
  const v=VOCAB[lcIdx];
  document.getElementById('lCard').innerHTML=
    '<span class="lc-em">'+v.em+'</span>'+
    '<div class="lc-word">'+v.word+'</div>'+
    '<div class="lc-es">'+v.es+'</div>'+
    '<div class="lc-tag '+(v.natural?'nat':'art')+'">'+(v.natural?'🌿 Natural':'🔧 Artificial')+'</div>';
  document.getElementById('lCnt').textContent=(lcIdx+1)+' / '+VOCAB.length;
  document.getElementById('lP').disabled=lcIdx===0;
  document.getElementById('lN').disabled=lcIdx===VOCAB.length-1;
  lcSeen.add(lcIdx);
  document.getElementById('lDots').innerHTML=VOCAB.map((_,i)=>'<div class="l-dot'+(i===lcIdx?' cur':lcSeen.has(i)?' seen':'')+'"></div>').join('');
  if(lcSeen.size===VOCAB.length){
    document.getElementById('btn1').disabled=false;
    document.getElementById('fb1').className='fb ok';
    document.getElementById('fb1').textContent='✅ All done! Ready to practise!';
  }
}
function lcMove(d){lcIdx=Math.max(0,Math.min(VOCAB.length-1,lcIdx+d));lcRender();}
function speakCard(){speak(VOCAB[lcIdx].word);}
lcRender();

function initQ2(){q2N=0;q2OK=0;q2Order=shuffle(VOCAB.map((_,i)=>i));nextQ2();}
function nextQ2(){
  if(q2N>=VOCAB.length){
    document.getElementById('tab2').classList.add('done');
    document.getElementById('fb2').className='fb ok';
    document.getElementById('fb2').innerHTML='🎉 '+q2OK+'/'+VOCAB.length+' correct!';
    setTimeout(()=>goTab(3),1400);return;
  }
  const ci=q2Order[q2N];
  document.getElementById('q2Em').textContent=VOCAB[ci].em;
  document.getElementById('q2Prog').textContent='Question '+(q2N+1)+' of '+VOCAB.length;
  const opts=shuffle([ci,...shuffle(VOCAB.map((_,i)=>i).filter(i=>i!==ci)).slice(0,3)]);
  document.getElementById('q2Grid').innerHTML=opts.map(oi=>
    '<button class="opt-btn" data-ci="'+oi+'" onclick="checkQ2(this,'+ci+')">'+VOCAB[oi].word+'</button>').join('');
  document.getElementById('fb2').textContent='';
}
function checkQ2(btn,ci){
  document.querySelectorAll('#q2Grid .opt-btn').forEach(b=>b.disabled=true);
  const ok=parseInt(btn.dataset.ci)===ci;
  if(ok){btn.classList.add('correct');q2OK++;upScore(10);flash(true);
    document.getElementById('fb2').className='fb ok';document.getElementById('fb2').textContent='✅ '+VOCAB[ci].word+'!';
    speak(VOCAB[ci].word);
  }else{btn.classList.add('wrong');
    document.querySelectorAll('#q2Grid .opt-btn').forEach(b=>{if(parseInt(b.dataset.ci)===ci)b.classList.add('correct');});
    flash(false);document.getElementById('fb2').className='fb no';document.getElementById('fb2').textContent='❌ It was: '+VOCAB[ci].word;
  }
  q2N++;setTimeout(nextQ2,1600);
}

function initQ3(){q3N=0;q3OK=0;q3Order=shuffle(VOCAB.map((_,i)=>i));nextQ3();}
function nextQ3(){
  if(q3N>=VOCAB.length){
    document.getElementById('fin').style.display='block';
    document.getElementById('finSc').textContent=score;
    const pct=Math.round((q2OK+q3OK)/(VOCAB.length*2)*100);
    const el=document.getElementById('recommend');
    if(pct>=80)el.innerHTML='<b style="color:#69f0ae">Excellent! '+pct+'%</b><br>You know all the structures! 🌟 Try eng19 next!';
    else if(pct>=60)el.innerHTML='<b style="color:#FFD700">Good! '+pct+'%</b><br>Remember: natural = made by nature (nest, shell, cave, skeleton, tree trunk, beaver dam). Artificial = made by people (bridge, ladder). 📖';
    else el.innerHTML='<b style="color:#ff5252">Keep practising! '+pct+'%</b><br>Natural: 🪺 nest · 🦫 beaver dam · 🪵 tree trunk · 🐚 shell · 🏔️ cave · 💀 skeleton<br>Artificial: 🌉 bridge · 🪜 ladder 💪';
    return;
  }
  const vi=q3Order[q3N];
  document.getElementById('q3Em').textContent=VOCAB[vi].em;
  document.getElementById('q3Word').textContent=VOCAB[vi].word;
  document.getElementById('q3Prog').textContent='Word '+(q3N+1)+' of '+VOCAB.length;
  document.getElementById('btnNat').disabled=false;
  document.getElementById('btnArt').disabled=false;
  document.getElementById('btnNat').classList.remove('correct','wrong');
  document.getElementById('btnArt').classList.remove('correct','wrong');
  document.getElementById('fb3').textContent='';
}
function checkSort(clickedNat){
  const bN=document.getElementById('btnNat'), bA=document.getElementById('btnArt');
  bN.disabled=true; bA.disabled=true;
  const vi=q3Order[q3N];
  const ok=clickedNat===VOCAB[vi].natural;
  if(ok){
    (clickedNat?bN:bA).classList.add('correct');
    q3OK++;upScore(10);flash(true);
    document.getElementById('fb3').className='fb ok';
    document.getElementById('fb3').textContent=VOCAB[vi].natural?'✅ "'+VOCAB[vi].word+'" is natural! 🌿':'✅ "'+VOCAB[vi].word+'" is artificial! 🔧';
    speak(VOCAB[vi].word);
  }else{
    (clickedNat?bN:bA).classList.add('wrong');
    (clickedNat?bA:bN).classList.add('correct');
    flash(false);
    document.getElementById('fb3').className='fb no';
    document.getElementById('fb3').textContent=VOCAB[vi].natural?'❌ "'+VOCAB[vi].word+'" IS natural! 🌿':'❌ "'+VOCAB[vi].word+'" IS artificial! 🔧';
  }
  q3N++;setTimeout(nextQ3,1800);
}
</script>
</body>
</html>
