<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🪟 Shiny Windows Lab</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#0d47a1 0%,#00838f 45%,#ffd54f 100%) fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}.bubble{position:absolute;font-size:1.6rem;opacity:.25;animation:rise 10s linear infinite}.b1{left:8%;bottom:-10%}.b2{left:30%;bottom:-22%;animation-delay:2s}.b3{left:70%;bottom:-16%;animation-delay:1s}.b4{left:88%;bottom:-20%;animation-delay:3s}@keyframes rise{0%{transform:translateY(0) scale(.8)}100%{transform:translateY(-120vh) scale(1.2)}}
main{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center}
.top-bar{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.back-btn{background:#003c6c;color:#FFD700;border:2px solid #80deea;border-radius:14px;padding:6px 14px;font-family:inherit;font-size:.95rem;cursor:pointer;text-decoration:none}.back-btn:hover{background:#80deea;color:#003c6c}
.score-box{background:#003c6c;color:#FFD700;border:2px solid #80deea;border-radius:20px;padding:4px 16px;font-size:1rem}
.phase-bar{display:flex;gap:6px;margin:8px 0 14px;flex-wrap:wrap;justify-content:center}.p-tab{padding:6px 16px;border-radius:20px;font-family:inherit;font-size:.92rem;border:2px solid #80deea;background:#003c6c;color:#b2ebf2}.p-tab.active{background:#00acc1;color:#fff;font-weight:bold}.p-tab.done{background:#2e7d32;border-color:#66bb6a;color:#fff}
.phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:700px;padding:0 12px}.phase.active{display:flex}
.ph-title{font-size:1.15rem;color:#fff59d;text-align:center;margin-bottom:12px}
.fb{min-height:2rem;font-size:1.08rem;text-align:center;margin:8px 0}.fb.ok{color:#69f0ae}.fb.no{color:#ff8a80}
.btn-main{background:linear-gradient(135deg,#ffee58,#ffca28);color:#1a237e;border:2px solid #fff59d;border-radius:20px;padding:10px 26px;font-family:inherit;font-size:1.03rem;cursor:pointer;margin-top:8px;font-weight:bold}
.flash-ov{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:20}.flash-ov.g{background:rgba(76,175,80,.22);opacity:1}.flash-ov.r{background:rgba(244,67,54,.2);opacity:1}
.flashcard{width:100%;max-width:370px;min-height:300px;background:linear-gradient(145deg,#003c6c,#006064);border:3px solid #80deea;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:18px;text-align:center;cursor:pointer;transition:transform .2s}.flashcard:hover{transform:scale(1.03)}
.c-emoji{font-size:4.2rem}.c-title{font-size:1.65rem;color:#FFD700}.c-type{font-size:1rem;color:#80deea;font-weight:bold}.c-desc{font-size:1rem;color:#e0f7fa;line-height:1.35}
.card-nav{display:flex;align-items:center;gap:14px;margin:12px 0 6px}.nav-btn{background:#003c6c;color:#FFD700;border:2px solid #80deea;border-radius:50%;width:44px;height:44px;font-size:1.4rem;cursor:pointer}.nav-btn:disabled{opacity:.35;cursor:default}
.prog{display:flex;gap:7px}.dot{width:12px;height:12px;border-radius:50%;border:2px solid #80deea;background:#003c6c}.dot.seen{background:#00acc1}.dot.active{background:#FFD700;border-color:#ffca28}
.sort-card{width:100%;max-width:500px;background:linear-gradient(145deg,#003c6c,#006064);border:2px solid #80deea;border-radius:18px;padding:18px;text-align:center}
.s-emoji{font-size:3rem}.s-name{font-size:1.3rem;color:#FFD700;font-weight:bold}.s-hint{font-size:.95rem;color:#b2ebf2;margin-bottom:10px}
.sort-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.sort-btn{padding:10px 14px;border-radius:14px;font-family:inherit;font-size:1rem;cursor:pointer;border:2px solid;font-weight:bold}
.sort-btn.opq{background:#5d4037;color:#FFD700;border-color:#bcaaa4}.sort-btn.transl{background:#6a1b9a;color:#FFD700;border-color:#ce93d8}.sort-btn.transp{background:#1565c0;color:#FFD700;border-color:#64b5f6}
.sp{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 0}.sp-dot{width:26px;height:26px;border-radius:50%;border:2px solid #80deea;display:flex;align-items:center;justify-content:center;background:#003c6c;color:#b2ebf2;font-size:.72rem}.sp-dot.correct{background:#1b5e20;border-color:#69f0ae;color:#69f0ae}.sp-dot.wrong{background:#4e1212;border-color:#ff8a80;color:#ff8a80}.sp-dot.current{border-color:#FFD700;background:#4e342e;color:#FFD700}
.quiz-card{width:100%;max-width:520px;background:#003c6c;border:2px solid #80deea;border-radius:16px;padding:20px;text-align:center}.q-prog{color:#b2ebf2;font-size:.92rem}.q-emoji{font-size:2.8rem;margin:6px 0}.q-q{font-size:1.15rem;color:#FFD700;margin:10px 0 12px}
.q-opts{display:flex;flex-direction:column;gap:10px;align-items:center}.q-opt{width:100%;max-width:390px;background:linear-gradient(135deg,#1565c0,#006064);border:2px solid #80deea;border-radius:14px;padding:11px 14px;color:#fff;font-family:inherit;font-size:1rem;cursor:pointer;text-align:left}.q-opt:hover:not(:disabled){border-color:#FFD700}.q-opt.correct-ans{border-color:#69f0ae;background:#1b5e20;color:#69f0ae}.q-opt.wrong-ans{border-color:#ff8a80;background:#4e1212;color:#ff8a80}
.finish{display:none;background:#003c6c;border:2px solid #69f0ae;border-radius:14px;padding:14px 20px;color:#69f0ae;margin-top:12px;text-align:center}.finish-row{display:none;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px}
</style>
</head>
<body>
<div class="bg"><span class="bubble b1">🫧</span><span class="bubble b2">💧</span><span class="bubble b3">🔆</span><span class="bubble b4">✨</span></div>
<div class="flash-ov" id="fov"></div>
<main>
  <div class="top-bar">
    <a class="back-btn" href="../asignaturas.html#science">← Science</a>
    <span style="color:#FFD700;font-size:1.08rem">🪟 Shiny Windows Lab</span>
    <div class="score-box">⭐ <span id="scoreDisp">0</span></div>
  </div>

  <div class="phase-bar">
    <div class="p-tab active" id="tab1">📚 Learn</div>
    <div class="p-tab" id="tab2">🪟 Classify</div>
    <div class="p-tab" id="tab3">❓ Quiz</div>
  </div>

  <div class="phase active" id="phase1">
    <p class="ph-title">Learn opaque, translucent and transparent objects.</p>
    <div class="flashcard" onclick="speakCurrent()">
      <div class="c-emoji" id="cEmoji"></div>
      <div class="c-title" id="cTitle"></div>
      <div class="c-type" id="cType"></div>
      <div class="c-desc" id="cDesc"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn-main" onclick="speakCurrent()">🔊 Say it</button>
      <button class="btn-main" id="phase1Btn" onclick="goTab(2)" disabled>✅ Classify objects</button>
    </div>
    <div class="card-nav">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()" disabled>◀</button>
      <div class="prog" id="prog"></div>
      <button class="nav-btn" id="nextBtn" onclick="nextCard()">▶</button>
    </div>
  </div>

  <div class="phase" id="phase2">
    <p class="ph-title">Choose the correct type of object.</p>
    <div class="sp" id="spBar"></div>
    <div class="sort-card" id="sortCard">
      <div class="s-emoji" id="sEmoji"></div>
      <div class="s-name" id="sName"></div>
      <div class="s-hint" id="sHint"></div>
      <div class="sort-btns">
        <button class="sort-btn opq" onclick="sortAnswer('opaque')">🚪 Opaque</button>
        <button class="sort-btn transl" onclick="sortAnswer('translucent')">🌫️ Translucent</button>
        <button class="sort-btn transp" onclick="sortAnswer('transparent')">🔍 Transparent</button>
      </div>
    </div>
    <div class="fb" id="fb2"></div>
    <button class="btn-main" id="btn2" onclick="goTab(3)" style="display:none">✅ Go to quiz</button>
  </div>

  <div class="phase" id="phase3">
    <div class="quiz-card" id="quizCard">
      <div class="q-prog" id="qProg"></div>
      <div class="q-emoji" id="qEmoji"></div>
      <div class="q-q" id="qQ"></div>
      <div class="q-opts" id="qOpts"></div>
    </div>
    <div class="fb" id="fb3"></div>
    <div class="finish" id="finish"></div>
    <div class="finish-row" id="finishRow">
      <button class="btn-main" onclick="location.reload()">🔄 Play again</button>
      <button class="btn-main" onclick="location.href='../asignaturas.html#science'">🏠 Science menu</button>
    </div>
  </div>
</main>

<script>
let score=0;const $=id=>document.getElementById(id);
const flash=c=>{const e=$('fov');e.className='flash-ov '+c;setTimeout(()=>e.className='flash-ov',260);};
function speak(t){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=0.88;speechSynthesis.speak(u);} 
const addScore=n=>{$('scoreDisp').textContent=score+=n;};
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
function goTab(n){[1,2,3].forEach(i=>{$('phase'+i).classList.remove('active');$('tab'+i).classList.remove('active');});$('phase'+n).classList.add('active');$('tab'+n).classList.add('active');if(n===2)buildSort();if(n===3)buildQuiz();}
function markDone(n){$('tab'+n).classList.remove('active');$('tab'+n).classList.add('done');}

const CARDS=[
  {emoji:'🚪',title:'Opaque',type:'NO LIGHT THROUGH',desc:'Opaque objects block light. You cannot see through them.'},
  {emoji:'🌫️',title:'Translucent',type:'SOME LIGHT THROUGH',desc:'Translucent objects let some light pass, but images look blurry.'},
  {emoji:'🔍',title:'Transparent',type:'LOTS OF LIGHT THROUGH',desc:'Transparent objects let most light pass. You can see clearly through them.'},
  {emoji:'🎡',title:'Light for Fun',type:'USE OF LIGHT',desc:'We use colorful lights in games, toys and celebrations.'},
  {emoji:'📺',title:'Light for Communication',type:'USE OF LIGHT',desc:'Screens and signs use light to send messages.'},
];

const SORT_ITEMS=[
  {emoji:'🧱',name:'Brick wall',hint:'No light can pass.',type:'opaque'},
  {emoji:'🧴',name:'Frosted bottle',hint:'Light passes, image is blurry.',type:'translucent'},
  {emoji:'🪟',name:'Clear window',hint:'You see clearly through it.',type:'transparent'},
  {emoji:'📘',name:'Book',hint:'Blocks light.',type:'opaque'},
  {emoji:'🧻',name:'Wax paper',hint:'Some light passes.',type:'translucent'},
  {emoji:'💧',name:'Clean water in glass',hint:'Light passes almost completely.',type:'transparent'},
  {emoji:'🪵',name:'Wooden door',hint:'No light goes through.',type:'opaque'},
  {emoji:'🚿',name:'Shower curtain',hint:'Lets light pass but not clear image.',type:'translucent'},
];

const QUIZ=[
  {q:'An opaque object lets...',opts:['No light through','A little light through','All light through'],ans:0,emoji:'🚪'},
  {q:'A clear window is...',opts:['Opaque','Translucent','Transparent'],ans:2,emoji:'🪟'},
  {q:'Wax paper is usually...',opts:['Transparent','Translucent','Opaque'],ans:1,emoji:'🧻'},
  {q:'We use colorful light shows mostly for...',opts:['Fun','Communication','Cleaning'],ans:0,emoji:'🎆'},
  {q:'A phone screen can be used for...',opts:['Communication','Only cooking','Growing plants'],ans:0,emoji:'📱'},
  {q:'If you can see shapes but blurry, the object is...',opts:['Opaque','Transparent','Translucent'],ans:2,emoji:'🌫️'},
  {q:'A wooden door is...',opts:['Opaque','Translucent','Transparent'],ans:0,emoji:'🪵'},
  {q:'Traffic signs with lights help us...',opts:['Dance','Communicate information','Sleep'],ans:1,emoji:'🚦'},
];

let ci=0,seen=new Set([0]);
function showCard(){const c=CARDS[ci];$('cEmoji').textContent=c.emoji;$('cTitle').textContent=c.title;$('cType').textContent=c.type;$('cDesc').textContent=c.desc;$('prevBtn').disabled=ci===0;$('nextBtn').disabled=ci===CARDS.length-1;$('prog').innerHTML=CARDS.map((_,i)=>`<div class="dot${seen.has(i)?' seen':''}${i===ci?' active':''}"></div>`).join('');if(seen.size===CARDS.length)$('phase1Btn').disabled=false;}
function nextCard(){if(ci<CARDS.length-1){ci++;seen.add(ci);showCard();}}
function prevCard(){if(ci>0){ci--;showCard();}}
function speakCurrent(){const c=CARDS[ci];speak(c.title+'. '+c.desc);} showCard();

let sortItems=[],si=0,sc=0;
function buildSort(){sortItems=shuffle(SORT_ITEMS);si=0;sc=0;$('btn2').style.display='none';$('fb2').textContent='';renderBar();showSort();}
function renderBar(){$('spBar').innerHTML=sortItems.map((_,i)=>{let cls='sp-dot';if(i===si)cls+=' current';return `<div class="${cls}" id="sd${i}">${i+1}</div>`;}).join('');}
function showSort(){if(si>=sortItems.length){endSort();return;}const it=sortItems[si];$('sEmoji').textContent=it.emoji;$('sName').textContent=it.name;$('sHint').textContent=it.hint;renderBar();speak(it.name);}
function sortAnswer(ans){const it=sortItems[si],dot=$('sd'+si);if(ans===it.type){flash('g');addScore(10);sc++;dot.classList.add('correct');$('fb2').className='fb ok';$('fb2').textContent='✅ Correct! '+it.name+' is '+it.type+'.';}else{flash('r');dot.classList.add('wrong');$('fb2').className='fb no';$('fb2').textContent='❌ '+it.name+' is '+it.type+'.';}si++;setTimeout(showSort,1000);}
function endSort(){markDone(2);$('sortCard').innerHTML='<div style="font-size:2rem">🎉</div><div style="font-size:1.2rem;color:#69f0ae">Great! '+sc+' / '+sortItems.length+' correct.</div>';$('fb2').textContent='';$('btn2').style.display='';}

let quizItems=[],qi=0,qc=0;
function buildQuiz(){quizItems=shuffle(QUIZ);qi=0;qc=0;$('finish').style.display='none';$('finishRow').style.display='none';$('quizCard').style.display='';$('fb3').textContent='';showQ();}
function showQ(){if(qi>=quizItems.length){endQuiz();return;}const q=quizItems[qi];$('qProg').textContent='Question '+(qi+1)+' / '+quizItems.length;$('qEmoji').textContent=q.emoji;$('qQ').textContent=q.q;$('qOpts').innerHTML=q.opts.map((o,i)=>`<button class="q-opt" onclick="ansQ(${i})">${o}</button>`).join('');}
function ansQ(i){const q=quizItems[qi],btns=[...document.querySelectorAll('.q-opt')];btns.forEach(b=>b.disabled=true);if(i===q.ans){flash('g');addScore(15);qc++;btns[i].classList.add('correct-ans');$('fb3').className='fb ok';$('fb3').textContent='✅ Great!';}else{flash('r');btns[i].classList.add('wrong-ans');btns[q.ans].classList.add('correct-ans');$('fb3').className='fb no';$('fb3').textContent='❌ Keep trying!';}qi++;setTimeout(showQ,1000);}
function endQuiz(){markDone(3);$('quizCard').style.display='none';$('finish').style.display='block';$('finish').textContent='🏁 Quiz: '+qc+' / '+quizItems.length+' correct. Total score: '+score+' ⭐';$('finishRow').style.display='flex';$('fb3').textContent='';}
</script>
</body>
</html>
