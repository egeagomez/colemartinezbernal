<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego 12 – Pasado, Presente o Futuro</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .sentence-box {
      font-size:1.35rem; line-height:1.7;
      background:#fff; border-radius:16px;
      padding:22px 28px; margin:20px 0;
      border:2px solid #e0e0e0; text-align:center;
      min-height:80px; display:flex; align-items:center; justify-content:center;
    }
    .marker {
      background:#FFF9C4; border-radius:5px;
      padding:2px 6px; font-weight:bold; color:#f57f17;
    }
    .tense-grid {
      display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
    }
    .tense-btn {
      padding:16px 22px; font-size:1.1rem; font-weight:bold;
      font-family:'Patrick Hand',cursive; border:none; border-radius:18px;
      cursor:pointer; transition:transform .12s, box-shadow .12s;
      min-width:130px; line-height:1.3;
    }
    .tense-btn:hover:not(:disabled) { transform:scale(1.06); box-shadow:0 4px 16px rgba(0,0,0,.2); }
    .tense-btn[data-tense="pasado"]   { background:#BCAAA4; color:#3e2723; }
    .tense-btn[data-tense="presente"] { background:#A5D6A7; color:#1b5e20; }
    .tense-btn[data-tense="futuro"]   { background:#90CAF9; color:#0d47a1; }
    .tense-btn.correct { outline:4px solid #4CAF50; transform:scale(1.08) !important; }
    .tense-btn.wrong   { outline:4px solid #EF5350; opacity:.65; }
  </style>
</head>
<body>
  <div class="game-header">
    <h1>⏳ Pasado, Presente o Futuro</h1>
    <div class="score-box">⭐ <span id="score">0</span></div>
  </div>
  <div class="game-area">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <p class="instruction">¿En qué tiempo está el verbo de la frase?</p>
    <div class="sentence-box" id="sentenceBox"></div>
    <div class="tense-grid">
      <button class="tense-btn" data-tense="pasado"   onclick="checkTense(this)">⏮ PASADO</button>
      <button class="tense-btn" data-tense="presente" onclick="checkTense(this)">▶ PRESENTE</button>
      <button class="tense-btn" data-tense="futuro"   onclick="checkTense(this)">⏭ FUTURO</button>
    </div>
    <div style="margin-top:20px">
      <button class="btn btn-green" id="nextBtn" style="display:none" onclick="nextEx()">Siguiente ▶</button>
    </div>
  </div>
  <script src="../assets/score.js"></script>
  <script>
  const exercises = [
    { html:`<span class="marker">Ayer</span>, Alba Lunar jugaba con su osito.`,               answer:'pasado' },
    { html:`<span class="marker">Mañana</span>, los robots llegarán a la Luna.`,               answer:'futuro' },
    { html:`<span class="marker">Hoy</span>, Alba Lunar mira la Tierra con Osi.`,              answer:'presente' },
    { html:`<span class="marker">Ayer por la tarde</span>, comí una manzana riquísima.`,       answer:'pasado' },
    { html:`<span class="marker">Esta tarde</span>, meriendo con mi mejor amiga.`,             answer:'presente' },
    { html:`<span class="marker">El año que viene</span>, iremos de excursión al castillo.`,   answer:'futuro' },
    { html:`<span class="marker">La semana pasada</span>, fui al parque con mi familia.`,      answer:'pasado' },
    { html:`<span class="marker">Ahora mismo</span>, estudio la lección de lengua.`,           answer:'presente' },
    { html:`<span class="marker">Mañana</span>, habrá una gran tormenta en la Luna.`,          answer:'futuro' },
    { html:`<span class="marker">Hace un rato</span>, llegué del colegio corriendo.`,          answer:'pasado' },
  ];

  let current = 0, score = 0, answered = false;

  function showEx() {
    answered = false;
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('progressBar').style.width = (current / exercises.length * 100) + '%';
    document.getElementById('sentenceBox').innerHTML = exercises[current].html;
    document.querySelectorAll('.tense-btn').forEach(b => {
      b.classList.remove('correct','wrong');
      b.disabled = false;
    });
  }

  function checkTense(btn) {
    if (answered) return;
    answered = true;
    const ex = exercises[current];
    const isCorrect = btn.dataset.tense === ex.answer;
    btn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) {
      document.querySelectorAll('.tense-btn').forEach(b => {
        if (b.dataset.tense === ex.answer) b.classList.add('correct');
      });
    }
    document.querySelectorAll('.tense-btn').forEach(b => b.disabled = true);
    if (isCorrect) { score += 10; document.getElementById('score').textContent = score; }
    Sound[isCorrect ? 'correct' : 'wrong']();
    showFeedback(isCorrect, isCorrect ? '¡Correcto! 🎉' : `Era <strong>${ex.answer.toUpperCase()}</strong>`);
    document.getElementById('nextBtn').style.display = 'inline-block';
  }

  function nextEx() {
    current++;
    if (current >= exercises.length) {
      maybePodio(12, score, exercises.length * 10);
    } else {
      showEx();
    }
  }

  showEx();
  </script>
</body>
</html>
