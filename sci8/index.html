<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔊 Sound Safari</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#4a148c 0%,#00695c 55%,#ff7043 100%) fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}.n{position:absolute;font-size:1.8rem;opacity:.28;animation:bob 4s ease-in-out infinite}.n1{left:10%;top:18%}.n2{left:78%;top:20%;animation-delay:1s}.n3{left:16%;top:78%;animation-delay:2s}.n4{left:85%;top:70%;animation-delay:1.5s}@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
main{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center}
.top-bar{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.back-btn{background:#3b0f63;color:#FFD700;border:2px solid #80cbc4;border-radius:14px;padding:6px 14px;font-family:inherit;font-size:.95rem;cursor:pointer;text-decoration:none}.back-btn:hover{background:#80cbc4;color:#2d004a}
.score-box{background:#2d004a;color:#FFD700;border:2px solid #80cbc4;border-radius:20px;padding:4px 16px;font-size:1rem}
.phase-bar{display:flex;gap:6px;margin:8px 0 14px;flex-wrap:wrap;justify-content:center}.p-tab{padding:6px 16px;border-radius:20px;font-family:inherit;font-size:.92rem;border:2px solid #80cbc4;background:#2d004a;color:#b2dfdb}.p-tab.active{background:#26a69a;color:#fff;font-weight:bold}.p-tab.done{background:#2e7d32;border-color:#66bb6a;color:#fff}
.phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:700px;padding:0 12px}.phase.active{display:flex}
.ph-title{font-size:1.15rem;color:#fff59d;text-align:center;margin-bottom:12px}
.fb{min-height:2rem;font-size:1.08rem;text-align:center;margin:8px 0}.fb.ok{color:#69f0ae}.fb.no{color:#ff8a80}
.btn-main{background:linear-gradient(135deg,#ffca28,#ff8f00);color:#1a237e;border:2px solid #fff59d;border-radius:20px;padding:10px 26px;font-family:inherit;font-size:1.03rem;cursor:pointer;margin-top:8px;font-weight:bold}
.flash-ov{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:20}.flash-ov.g{background:rgba(76,175,80,.22);opacity:1}.flash-ov.r{background:rgba(244,67,54,.2);opacity:1}
.flashcard{width:100%;max-width:370px;min-height:300px;background:linear-gradient(145deg,#2d004a,#00695c);border:3px solid #80cbc4;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:18px;text-align:center;cursor:pointer;transition:transform .2s}.flashcard:hover{transform:scale(1.03)}
.c-emoji{font-size:4.2rem}.c-title{font-size:1.65rem;color:#FFD700}.c-type{font-size:1rem;color:#80cbc4;font-weight:bold}.c-desc{font-size:1rem;color:#e0f2f1;line-height:1.35}
.card-nav{display:flex;align-items:center;gap:14px;margin:12px 0 6px}.nav-btn{background:#2d004a;color:#FFD700;border:2px solid #80cbc4;border-radius:50%;width:44px;height:44px;font-size:1.4rem;cursor:pointer}.nav-btn:disabled{opacity:.35;cursor:default}
.prog{display:flex;gap:7px}.dot{width:12px;height:12px;border-radius:50%;border:2px solid #80cbc4;background:#2d004a}.dot.seen{background:#26a69a}.dot.active{background:#FFD700;border-color:#ffca28}
.sort-card{width:100%;max-width:470px;background:linear-gradient(145deg,#2d004a,#00695c);border:2px solid #80cbc4;border-radius:18px;padding:18px;text-align:center}.s-emoji{font-size:3rem}.s-name{font-size:1.3rem;color:#FFD700;font-weight:bold}.s-hint{font-size:.95rem;color:#b2dfdb;margin-bottom:10px}
.sort-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.sort-btn{padding:10px 18px;border-radius:14px;font-family:inherit;font-size:1rem;cursor:pointer;border:2px solid;font-weight:bold}.sort-btn.nat{background:#2e7d32;color:#FFD700;border-color:#81c784}.sort-btn.art{background:#1565c0;color:#FFD700;border-color:#64b5f6}
.sp{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 0}.sp-dot{width:26px;height:26px;border-radius:50%;border:2px solid #80cbc4;display:flex;align-items:center;justify-content:center;background:#2d004a;color:#b2dfdb;font-size:.72rem}.sp-dot.correct{background:#1b5e20;border-color:#69f0ae;color:#69f0ae}.sp-dot.wrong{background:#4e1212;border-color:#ff8a80;color:#ff8a80}.sp-dot.current{border-color:#FFD700;background:#4e342e;color:#FFD700}
.quiz-card{width:100%;max-width:520px;background:#2d004a;border:2px solid #80cbc4;border-radius:16px;padding:20px;text-align:center}.q-prog{color:#b2dfdb;font-size:.92rem}.q-emoji{font-size:2.8rem;margin:6px 0}.q-q{font-size:1.15rem;color:#FFD700;margin:10px 0 12px}
.q-opts{display:flex;flex-direction:column;gap:10px;align-items:center}.q-opt{width:100%;max-width:390px;background:linear-gradient(135deg,#4a148c,#00695c);border:2px solid #80cbc4;border-radius:14px;padding:11px 14px;color:#fff;font-family:inherit;font-size:1rem;cursor:pointer;text-align:left}.q-opt:hover:not(:disabled){border-color:#FFD700}.q-opt.correct-ans{border-color:#69f0ae;background:#1b5e20;color:#69f0ae}.q-opt.wrong-ans{border-color:#ff8a80;background:#4e1212;color:#ff8a80}
.finish{display:none;background:#2d004a;border:2px solid #69f0ae;border-radius:14px;padding:14px 20px;color:#69f0ae;margin-top:12px;text-align:center}.finish-row{display:none;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px}
</style>
</head>
<body>
<div class="bg"><span class="n n1">🎵</span><span class="n n2">🔊</span><span class="n n3">🎶</span><span class="n n4">📣</span></div>
<div class="flash-ov" id="fov"></div>
<main>
  <div class="top-bar">
    <a class="back-btn" href="../asignaturas.html#science">← Science</a>
    <span style="color:#FFD700;font-size:1.08rem">🔊 Sound Safari</span>
    <div class="score-box">⭐ <span id="scoreDisp">0</span></div>
  </div>

  <div class="phase-bar">
    <div class="p-tab active" id="tab1">📚 Learn</div>
    <div class="p-tab" id="tab2">🧭 Sort</div>
    <div class="p-tab" id="tab3">❓ Quiz</div>
  </div>

  <div class="phase active" id="phase1">
    <p class="ph-title">Learn natural and artificial sounds.</p>
    <div class="flashcard" onclick="speakCurrent()">
      <div class="c-emoji" id="cEmoji"></div>
      <div class="c-title" id="cTitle"></div>
      <div class="c-type" id="cType"></div>
      <div class="c-desc" id="cDesc"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn-main" onclick="speakCurrent()">🔊 Say it</button>
      <button class="btn-main" id="phase1Btn" onclick="goTab(2)" disabled>✅ Sort sounds</button>
    </div>
    <div class="card-nav">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()" disabled>◀</button>
      <div class="prog" id="prog"></div>
      <button class="nav-btn" id="nextBtn" onclick="nextCard()">▶</button>
    </div>
  </div>

  <div class="phase" id="phase2">
    <p class="ph-title">Is this sound natural or artificial?</p>
    <div class="sp" id="spBar"></div>
    <div class="sort-card" id="sortCard">
      <div class="s-emoji" id="sEmoji"></div>
      <div class="s-name" id="sName"></div>
      <div class="s-hint" id="sHint"></div>
      <div class="sort-btns">
        <button class="sort-btn nat" onclick="sortAnswer('natural')">🌿 Natural</button>
        <button class="sort-btn art" onclick="sortAnswer('artificial')">🏭 Artificial</button>
      </div>
    </div>
    <div class="fb" id="fb2"></div>
    <button class="btn-main" id="btn2" onclick="goTab(3)" style="display:none">✅ Go to quiz</button>
  </div>

  <div class="phase" id="phase3">
    <div class="quiz-card" id="quizCard">
      <div class="q-prog" id="qProg"></div>
      <div class="q-emoji" id="qEmoji"></div>
      <div class="q-q" id="qQ"></div>
      <div class="q-opts" id="qOpts"></div>
    </div>
    <div class="fb" id="fb3"></div>
    <div class="finish" id="finish"></div>
    <div class="finish-row" id="finishRow">
      <button class="btn-main" onclick="location.reload()">🔄 Play again</button>
      <button class="btn-main" onclick="location.href='../asignaturas.html#science'">🏠 Science menu</button>
    </div>
  </div>
</main>

<script>
let score=0;const $=id=>document.getElementById(id);
const flash=c=>{const e=$('fov');e.className='flash-ov '+c;setTimeout(()=>e.className='flash-ov',260);};
function speak(t){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=0.88;speechSynthesis.speak(u);} 
const addScore=n=>{$('scoreDisp').textContent=score+=n;};
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
function goTab(n){[1,2,3].forEach(i=>{$('phase'+i).classList.remove('active');$('tab'+i).classList.remove('active');});$('phase'+n).classList.add('active');$('tab'+n).classList.add('active');if(n===2)buildSort();if(n===3)buildQuiz();}
function markDone(n){$('tab'+n).classList.remove('active');$('tab'+n).classList.add('done');}

const CARDS=[
  {emoji:'🐦',title:'Natural Sound',type:'FROM NATURE',desc:'Natural sounds come from animals and nature: birds, rain, wind, thunder.'},
  {emoji:'🚗',title:'Artificial Sound',type:'MADE BY PEOPLE',desc:'Artificial sounds are made by humans and machines: car horn, bell, TV, phone.'},
  {emoji:'🎉',title:'Sound for Fun',type:'USE OF SOUND',desc:'We use sound for fun in music, games, songs and celebrations.'},
  {emoji:'📣',title:'Sound for Communication',type:'USE OF SOUND',desc:'We use sound to communicate with voices, alarms, telephones and announcements.'},
  {emoji:'🧠',title:'Listening Skills',type:'SCIENCE',desc:'Our ears help us identify where sounds come from and what they mean.'},
];

const SORT_ITEMS=[
  {emoji:'🌧️',name:'Rain',hint:'Comes from weather.',type:'natural'},
  {emoji:'🚨',name:'Police siren',hint:'Device made by people.',type:'artificial'},
  {emoji:'🐶',name:'Dog bark',hint:'Animal sound.',type:'natural'},
  {emoji:'📱',name:'Phone ring',hint:'Electronic sound.',type:'artificial'},
  {emoji:'🌬️',name:'Wind',hint:'Nature in motion.',type:'natural'},
  {emoji:'🏍️',name:'Motorbike engine',hint:'Machine sound.',type:'artificial'},
  {emoji:'⚡',name:'Thunder',hint:'Storm sound.',type:'natural'},
  {emoji:'🔔',name:'School bell',hint:'Human-made signal.',type:'artificial'},
];

const QUIZ=[
  {q:'Which sound is natural?',opts:['Car horn','Rain','TV'],ans:1,emoji:'🌧️'},
  {q:'Which sound is artificial?',opts:['Bird song','Thunder','Phone ring'],ans:2,emoji:'📱'},
  {q:'Music in a party is sound for...',opts:['Fun','Communication only','Sleeping'],ans:0,emoji:'🎵'},
  {q:'A fire alarm is sound for...',opts:['Fun','Communication and safety','Decoration'],ans:1,emoji:'🚨'},
  {q:'Dog barking is...',opts:['Natural sound','Artificial sound','No sound'],ans:0,emoji:'🐶'},
  {q:'Which pair has only artificial sounds?',opts:['Siren and bell','Wind and thunder','Bird and rain'],ans:0,emoji:'🏭'},
  {q:'Our ears help us...',opts:['Taste food','Hear and identify sounds','See in the dark'],ans:1,emoji:'👂'},
  {q:'Talking to a friend uses sound for...',opts:['Communication','Only fun','Color'],ans:0,emoji:'🗣️'},
];

let ci=0,seen=new Set([0]);
function showCard(){const c=CARDS[ci];$('cEmoji').textContent=c.emoji;$('cTitle').textContent=c.title;$('cType').textContent=c.type;$('cDesc').textContent=c.desc;$('prevBtn').disabled=ci===0;$('nextBtn').disabled=ci===CARDS.length-1;$('prog').innerHTML=CARDS.map((_,i)=>`<div class="dot${seen.has(i)?' seen':''}${i===ci?' active':''}"></div>`).join('');if(seen.size===CARDS.length)$('phase1Btn').disabled=false;}
function nextCard(){if(ci<CARDS.length-1){ci++;seen.add(ci);showCard();}}
function prevCard(){if(ci>0){ci--;showCard();}}
function speakCurrent(){const c=CARDS[ci];speak(c.title+'. '+c.desc);} showCard();

let sortItems=[],si=0,sc=0;
function buildSort(){sortItems=shuffle(SORT_ITEMS);si=0;sc=0;$('btn2').style.display='none';$('fb2').textContent='';renderBar();showSort();}
function renderBar(){$('spBar').innerHTML=sortItems.map((_,i)=>{let cls='sp-dot';if(i===si)cls+=' current';return `<div class="${cls}" id="sd${i}">${i+1}</div>`;}).join('');}
function showSort(){if(si>=sortItems.length){endSort();return;}const it=sortItems[si];$('sEmoji').textContent=it.emoji;$('sName').textContent=it.name;$('sHint').textContent=it.hint;renderBar();speak(it.name);}
function sortAnswer(ans){const it=sortItems[si],dot=$('sd'+si);if(ans===it.type){flash('g');addScore(10);sc++;dot.classList.add('correct');$('fb2').className='fb ok';$('fb2').textContent='✅ Correct! '+it.name+' is '+it.type+'.';}else{flash('r');dot.classList.add('wrong');$('fb2').className='fb no';$('fb2').textContent='❌ '+it.name+' is '+it.type+'.';}si++;setTimeout(showSort,1000);}
function endSort(){markDone(2);$('sortCard').innerHTML='<div style="font-size:2rem">🎉</div><div style="font-size:1.2rem;color:#69f0ae">Great! '+sc+' / '+sortItems.length+' correct.</div>';$('fb2').textContent='';$('btn2').style.display='';}

let quizItems=[],qi=0,qc=0;
function buildQuiz(){quizItems=shuffle(QUIZ);qi=0;qc=0;$('finish').style.display='none';$('finishRow').style.display='none';$('quizCard').style.display='';$('fb3').textContent='';showQ();}
function showQ(){if(qi>=quizItems.length){endQuiz();return;}const q=quizItems[qi];$('qProg').textContent='Question '+(qi+1)+' / '+quizItems.length;$('qEmoji').textContent=q.emoji;$('qQ').textContent=q.q;$('qOpts').innerHTML=q.opts.map((o,i)=>`<button class="q-opt" onclick="ansQ(${i})">${o}</button>`).join('');}
function ansQ(i){const q=quizItems[qi],btns=[...document.querySelectorAll('.q-opt')];btns.forEach(b=>b.disabled=true);if(i===q.ans){flash('g');addScore(15);qc++;btns[i].classList.add('correct-ans');$('fb3').className='fb ok';$('fb3').textContent='✅ Great!';}else{flash('r');btns[i].classList.add('wrong-ans');btns[q.ans].classList.add('correct-ans');$('fb3').className='fb no';$('fb3').textContent='❌ Keep trying!';}qi++;setTimeout(showQ,1000);}
function endQuiz(){markDone(3);$('quizCard').style.display='none';$('finish').style.display='block';$('finish').textContent='🏁 Quiz: '+qc+' / '+quizItems.length+' correct. Total score: '+score+' ⭐';$('finishRow').style.display='flex';$('fb3').textContent='';}
</script>
</body>
</html>
