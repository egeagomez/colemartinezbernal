<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restas Rebeldes — Academia de Magia</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body { background: linear-gradient(135deg,#1a0533 0%,#2d004a 100%) fixed; }
    .hp-header { background:linear-gradient(135deg,#2d004a,#4a0072); border-bottom:3px solid #FFD700; color:#FFD700; text-shadow:0 0 12px #a020f0; }
    .hp-header .score-box { background:#4a0072; color:#FFD700; border:1px solid #7c43bd; }
    .level-badge { display:inline-block; background:#4a0072; color:#FFD700; border:2px solid #FFD700; border-radius:20px; padding:4px 18px; font-size:1rem; margin:6px 0; font-family:'Patrick Hand',cursive; }
    .streak-bar { display:flex; gap:6px; justify-content:center; margin:6px 0; }
    .streak-dot { width:18px; height:18px; border-radius:50%; background:#4a0072; border:2px solid #7c43bd; transition:background .3s; }
    .streak-dot.lit { background:#FFD700; border-color:#FFD700; }
    .op-board { background:#fff; border-radius:16px; padding:24px 32px; display:inline-block; margin:16px auto; box-shadow:0 4px 20px rgba(160,32,240,.35); font-family:'Patrick Hand',cursive; border:3px solid #7c43bd; }
    .op-table { border-collapse:separate; border-spacing:4px; margin:0 auto; }
    .op-table td { text-align:center; vertical-align:middle; }
    .dnum { font-size:2rem; width:52px; height:52px; line-height:52px; text-align:center; font-family:'Patrick Hand',cursive; color:#1a0533; }
    .dsign { font-size:2rem; color:#7c43bd; padding-right:8px; font-weight:bold; }
    .dline td { border-top:3px solid #1a0533; padding-top:6px; }
    .spin-wrap { display:flex; flex-direction:column; align-items:center; gap:0; }
    .spin-btn { width:52px; height:24px; background:#e1bee7; border:none; cursor:pointer; font-size:1rem; border-radius:6px 6px 0 0; color:#4a0072; font-weight:bold; transition:background .1s; line-height:1; }
    .spin-btn.down { border-radius:0 0 6px 6px; }
    .spin-btn:hover { background:#ce93d8; }
    .spin-val { width:52px; height:52px; line-height:52px; text-align:center; font-size:2rem; font-family:'Patrick Hand',cursive; background:#fff; border:2px solid #7c43bd; color:#1a0533; user-select:none; cursor:pointer; transition:background .15s; }
    .spin-val:hover { background:#f3e5f5; }
    .spin-val.correct { background:#C8E6C9 !important; border-color:#4CAF50 !important; color:#2E7D32; }
    .spin-val.wrong   { background:#FFCDD2 !important; border-color:#EF5350 !important; color:#c62828; animation:snake .4s; }

    @keyframes snake { 0%{transform:rotate(0)} 20%{transform:rotate(-6deg)} 40%{transform:rotate(6deg)} 60%{transform:rotate(-4deg)} 80%{transform:rotate(4deg)} 100%{transform:rotate(0)} }
    @keyframes hatPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.3) rotate(8deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
    .hat-anim { position:fixed; top:15%; left:50%; transform:translateX(-50%); font-size:5rem; z-index:999; pointer-events:none; animation:hatPop .7s ease forwards; }
    .btn-magic { background:linear-gradient(135deg,#7c43bd,#ab47bc); color:#fff; border:none; border-radius:20px; padding:12px 32px; font-size:1.15rem; font-family:'Patrick Hand',cursive; cursor:pointer; box-shadow:0 4px 14px rgba(100,0,200,.4); transition:transform .1s; }
    .btn-magic:hover { transform:scale(1.04); }
    .btn-gold { background:#FFD700; color:#2d004a; border:none; border-radius:20px; padding:12px 32px; font-size:1.15rem; font-family:'Patrick Hand',cursive; cursor:pointer; font-weight:bold; box-shadow:0 4px 14px rgba(160,32,240,.3); transition:transform .1s; }
    .btn-gold:hover { transform:scale(1.04); }
    #msgBox { min-height:1.6em; font-size:1.05rem; text-align:center; color:#FFD700; margin:8px 0; font-family:'Patrick Hand',cursive; }
    .instruction { color:#e1bee7 !important; }
    .game-area { background:rgba(255,255,255,.04); border:1px solid #4a0072; }
    .hint-row { font-size:.95rem; color:#ce93d8; text-align:center; margin-bottom:4px; font-style:italic; }
  </style>
</head>
<body>
  <div class="game-header hp-header">
    <h1>➖ Restas Rebeldes</h1>
    <div class="score-box">🧙 <span id="score">0</span></div>
  </div>
  <div class="game-area">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div style="text-align:center">
      <div class="level-badge" id="levelBadge">🎓 Aprendiz</div>
      <div class="streak-bar" id="streakBar"></div>
      <p class="instruction">Completa la resta y gira las ruedas para poner el resultado.</p>
    </div>
    <div style="text-align:center">
      <div class="op-board">
        <table class="op-table" id="opTable"></table>
      </div>
    </div>
    <p id="msgBox"></p>
    <div style="text-align:center;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:8px">
      <button class="btn-magic" id="checkBtn" onclick="checkResta()">🔮 Comprobar</button>
      <button class="btn-gold"  id="nextBtn"  style="display:none" onclick="newResta()">✨ Nueva resta</button>
    </div>
  </div>

  <script src="../assets/score.js"></script>
  <script>
  const LEVELS = [
    { name:'🎓 Aprendiz'      },
    { name:'⚡ Mago'          },
    { name:'🌟 Archimago'     },
    { name:'🧙 Brujo Experto' },
  ];
  const MAX_VALS = [39, 59, 79, 99];
  let levelIdx = parseInt(sessionStorage.getItem('mat2_level')||'0');
  let streak = 0, totalScore = 0;
  const STREAK_NEEDED = 3;

  function rnd(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }

  function genResta() {
    const maxV = MAX_VALS[levelIdx];
    for(let i=0; i<200; i++){
      let a = rnd(20, Math.max(20, maxV));
      let b = rnd(10, a-1);
      if (a - b < 1) continue;
      return {a, b};
    }
    return {a:35, b:12};
  }

  let nums = {a:0,b:0};
  let cells = {};

  function makeSpinner(id, maxVal=9) {
    cells[id] = {val:0};
    return `<div class="spin-wrap">
      <button class="spin-btn"      onclick="adj('${id}',1,${maxVal})">▲</button>
      <div class="spin-val" id="${id}" onclick="adj('${id}',1,${maxVal})">0</div>
      <button class="spin-btn down" onclick="adj('${id}',-1,${maxVal})">▼</button>
    </div>`;
  }

  function adj(id, delta, maxVal) {
    const el = document.getElementById(id);
    el.classList.remove('correct','wrong');
    cells[id].val = (cells[id].val + delta + maxVal + 1) % (maxVal + 1);
    el.textContent = cells[id].val;
  }
  function buildTable() {
    const {a, b} = nums;
    const aT = Math.floor(a/10), aU = a%10;
    const bT = Math.floor(b/10), bU = b%10;
    cells = {};

    document.getElementById('opTable').innerHTML = `
      <tr>
        <td class="dsign"></td>
        <td class="dnum">${aT}</td>
        <td class="dnum">${aU}</td>
      </tr>
      <tr>
        <td class="dsign">−</td>
        <td class="dnum">${bT}</td>
        <td class="dnum">${bU}</td>
      </tr>
      <tr class="dline">
        <td></td>
        <td>${makeSpinner('rT')}</td>
        <td>${makeSpinner('rU')}</td>
      </tr>`;
  }

  function checkResta() {
    const {a, b} = nums;
    const res   = a - b;
    const corrRU = res % 10;
    const corrRT = Math.floor(res/10);

    const checks = [
      {id:'rU', corr:corrRU},
      {id:'rT', corr:corrRT},
    ];

    let allOk = true;
    checks.forEach(({id,corr})=>{
      const el = document.getElementById(id);
      if(!el) return;
      const ok = cells[id].val === corr;
      el.classList.toggle('correct', ok);
      el.classList.toggle('wrong', !ok);
      if(!ok) allOk = false;
    });

    document.getElementById('checkBtn').disabled = true;

    if (allOk) {
      totalScore += (levelIdx+1)*10;
      streak++;
      document.getElementById('score').textContent = totalScore;
      showHat();
      updateStreak();
      if (streak >= STREAK_NEEDED && levelIdx < 3) {
        levelIdx++;
        streak = 0;
        sessionStorage.setItem('mat2_level', levelIdx);
        document.getElementById('msgBox').textContent =
          `✨ ¡Subiste de nivel! Ahora eres ${LEVELS[levelIdx].name}`;
        updateLevelBadge();
      } else {
        document.getElementById('msgBox').textContent =
          ['¡Perfecto! 🎉','¡Excelente! ⚡','¡Brillante! 🌟','¡Mágico! 🧙'][levelIdx];
      }
    } else {
      streak = 0; Sound.wrong();
      document.getElementById('msgBox').textContent =
        '🐍 Hay algún error. Revisa las celdas en rojo.';
      setTimeout(()=>{ document.getElementById('checkBtn').disabled=false; }, 600);
    }
    document.getElementById('nextBtn').style.display='inline-block';
  }

  function showHat() {
    Sound.fanfare();
    const h = document.createElement('div');
    h.className = 'hat-anim';
    h.textContent = ['🧢','🎩','🪄','🧙'][levelIdx];
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), 900);
  }
  function updateLevelBadge() {
    document.getElementById('levelBadge').textContent = LEVELS[levelIdx].name;
  }
  function updateStreak() {
    document.getElementById('streakBar').innerHTML =
      Array.from({length:STREAK_NEEDED},(_,i)=>
        `<div class="streak-dot ${i<streak?'lit':''}"></div>`).join('');
  }

  function newResta() {
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('checkBtn').disabled=false;
    document.getElementById('msgBox').textContent='';
    nums = genResta();
    buildTable();
    updateLevelBadge();
    updateStreak();
  }

  updateLevelBadge(); updateStreak();
  nums = genResta(); buildTable();
  </script>
</body>
</html>
