<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Tesoro Mágico — Academia de Magia</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body { background: linear-gradient(135deg,#1a0533 0%,#2d004a 100%) fixed; }
    .hp-header { background: linear-gradient(135deg,#2d004a,#4a0072); border-bottom: 3px solid #FFD700; color: #FFD700; text-shadow: 0 0 12px #a020f0; }
    .hp-header .score-box { background:#4a0072; color:#FFD700; border:1px solid #7c43bd; }
    .level-badge { display:inline-block; background:#4a0072; color:#FFD700; border:2px solid #FFD700; border-radius:20px; padding:4px 18px; font-size:1rem; margin:6px 0; font-family:'Patrick Hand',cursive; }
    .streak-bar { display:flex; gap:6px; justify-content:center; margin:6px 0; }
    .streak-dot { width:18px; height:18px; border-radius:50%; background:#4a0072; border:2px solid #7c43bd; transition:background .3s; }
    .streak-dot.lit { background:#FFD700; border-color:#FFD700; }

    .problem-card {
      background:#fff; border-radius:16px; padding:18px 22px;
      max-width:520px; margin:10px auto;
      box-shadow:0 4px 20px rgba(160,32,240,.35);
      border:3px solid #7c43bd; font-family:'Patrick Hand',cursive;
    }
    .prob-text { font-size:1.1rem; color:#4a0072; text-align:center; margin-bottom:14px; line-height:1.55; }

    .coin-row { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:10px 0 16px; }
    .coin { background:#fff8e1; border:2px solid #FFD700; border-radius:50%; width:58px; height:58px; display:flex; align-items:center; justify-content:center; font-size:.95rem; font-weight:bold; color:#7c4a00; box-shadow:0 2px 6px rgba(0,0,0,.15); flex-direction:column; }
    .coin .ico { font-size:1.3rem; }
    .bill { background:#e8f5e9; border:2px solid #4CAF50; border-radius:8px; padding:10px 14px; font-size:1rem; font-weight:bold; color:#1b5e20; box-shadow:0 2px 6px rgba(0,0,0,.15); display:flex; flex-direction:column; align-items:center; min-width:64px; }
    .bill .ico { font-size:1.4rem; }

    .answer-row { display:flex; align-items:flex-end; justify-content:center; gap:18px; flex-wrap:wrap; margin-top:8px; }
    .answer-block { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .answer-label { font-size:.95rem; color:#7c43bd; font-weight:bold; }
    .digit-pair { display:flex; gap:6px; }

    .spin-wrap { display:flex; flex-direction:column; align-items:center; gap:0; }
    .spin-btn { width:48px; height:24px; background:#e1bee7; border:none; cursor:pointer; font-size:.95rem; border-radius:6px 6px 0 0; color:#4a0072; font-weight:bold; transition:background .1s; }
    .spin-btn.down { border-radius:0 0 6px 6px; }
    .spin-btn:hover { background:#ce93d8; }
    .spin-val { width:48px; height:48px; line-height:48px; text-align:center; font-size:1.8rem; font-family:'Patrick Hand',cursive; background:#fff; border:2px solid #7c43bd; color:#1a0533; user-select:none; cursor:pointer; transition:background .15s; }
    .spin-val.correct { background:#C8E6C9 !important; border-color:#4CAF50 !important; color:#2E7D32; }
    .spin-val.wrong   { background:#FFCDD2 !important; border-color:#EF5350 !important; color:#c62828; animation:snake .4s; }

    .btn-magic { background: linear-gradient(135deg,#7c43bd,#ab47bc); color:#fff; border:none; border-radius:20px; padding:12px 32px; font-size:1.15rem; font-family:'Patrick Hand',cursive; cursor:pointer; box-shadow:0 4px 14px rgba(100,0,200,.4); transition:transform .1s; }
    .btn-gold { background:#FFD700; color:#2d004a; border:none; border-radius:20px; padding:12px 32px; font-size:1.15rem; font-family:'Patrick Hand',cursive; cursor:pointer; font-weight:bold; transition:transform .1s; }
    .btn-magic:hover,.btn-gold:hover { transform:scale(1.04); }
    #msgBox { min-height:1.6em; font-size:1.05rem; text-align:center; color:#FFD700; margin:8px 0; font-family:'Patrick Hand',cursive; }
    .instruction { color:#e1bee7 !important; }
    .game-area { background:rgba(255,255,255,.04); border:1px solid #4a0072; }
    @keyframes snake { 0%{transform:rotate(0)} 20%{transform:rotate(-6deg)} 40%{transform:rotate(6deg)} 60%{transform:rotate(-4deg)} 80%{transform:rotate(4deg)} 100%{transform:rotate(0)} }
    @keyframes hatPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.3) rotate(8deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
    .hat-anim { position:fixed; top:15%; left:50%; transform:translateX(-50%); font-size:5rem; z-index:999; pointer-events:none; animation:hatPop .7s ease forwards; }
  </style>
</head>
<body>
  <div class="game-header hp-header">
    <h1>💰 El Tesoro Mágico</h1>
    <div class="score-box">🧙 <span id="score">0</span></div>
  </div>
  <div class="game-area">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div style="text-align:center">
      <div class="level-badge" id="levelBadge">🎓 Aprendiz</div>
      <div class="streak-bar" id="streakBar"></div>
      <p class="instruction">Cuenta las monedas y billetes con cuidado.</p>
    </div>
    <div class="problem-card" id="problemCard"></div>
    <p id="msgBox"></p>
    <div style="text-align:center;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:8px">
      <button class="btn-magic" id="checkBtn" onclick="checkAnswer()">🔮 Comprobar</button>
      <button class="btn-gold"  id="nextBtn"  style="display:none" onclick="newProblem()">✨ Siguiente</button>
    </div>
  </div>
  <script src="../assets/score.js"></script>
  <script>
  const LEVELS = [
    {name:'🎓 Aprendiz'},{name:'⚡ Mago'},{name:'🌟 Archimago'},{name:'🧙 Brujo Experto'}
  ];
  let levelIdx = parseInt(sessionStorage.getItem('mat30_level')||'0');
  let streak = 0, totalScore = 0;
  const STREAK_NEEDED = 3;
  const MAX_QUESTIONS = 15;
  let questionCount = 0;

  function rnd(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }

  // Valores en céntimos -> { etiqueta, icono, tipo (coin/bill) }
  const DENOMS = {
    10:{label:'10c',ico:'🪙',type:'coin'}, 20:{label:'20c',ico:'🪙',type:'coin'}, 50:{label:'50c',ico:'🪙',type:'coin'},
    100:{label:'1€',ico:'🟡',type:'coin'}, 200:{label:'2€',ico:'🟠',type:'coin'},
    500:{label:'5€',ico:'💵',type:'bill'}, 1000:{label:'10€',ico:'💶',type:'bill'}, 2000:{label:'20€',ico:'💷',type:'bill'}
  };

  // Monedas/billetes disponibles para sumar, según nivel (sin repetir valores)
  const SUMA_POOL = [
    [50,100,200,500],
    [20,50,100,200,500,1000],
    [10,20,50,100,200,500,1000],
    [10,20,50,100,200,500,1000,2000]
  ];
  const SUMA_N = [2,2,3,3];

  // Elige n valores distintos del pool (sin repetición)
  function pickDistinct(pool, n) {
    const arr = pool.slice();
    for (let i=arr.length-1; i>0; i--) {
      const j = rnd(0,i);
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr.slice(0,n);
  }

  const OBJECTS = [
    {name:'una pelota', emoji:'⚽'},
    {name:'un libro', emoji:'📖'},
    {name:'un helado', emoji:'🍦'},
    {name:'una mochila', emoji:'🎒'},
    {name:'un peluche', emoji:'🧸'},
    {name:'unas pinturas', emoji:'🖍️'},
    {name:'un bocadillo', emoji:'🥪'},
    {name:'una entrada de cine', emoji:'🎬'},
  ];

  let prob = {};
  let spins = [0,0,0,0]; // EurosD, EurosU, CentD, CentU

  function genPrice() {
    if (levelIdx===0) return rnd(1,9)*100;
    if (levelIdx===1) return rnd(1,19)*100;
    if (levelIdx===2) return rnd(1,19)*100 + (Math.random()<0.5?50:0);
    return rnd(1,45)*100 + (Math.random()<0.5?50:0);
  }
  function pickPayment(price) {
    if (price < 1000) return 1000;
    if (price < 2000) return 2000;
    return 5000;
  }

  function genProblem() {
    questionCount++;
    document.getElementById('progressBar').style.width = (questionCount / MAX_QUESTIONS * 100) + '%';
    let type;
    if (levelIdx===0) type = 'suma';
    else if (levelIdx===1) type = Math.random()<0.5 ? 'suma' : 'compra';
    else type = ['suma','compra','falta'][rnd(0,2)];

    if (type==='suma') {
      const pool = SUMA_POOL[levelIdx];
      const n = SUMA_N[levelIdx];
      const items = pickDistinct(pool, n);
      const total = items.reduce((a,b)=>a+b,0);
      prob = { type:'suma', items, total };
    } else if (type==='compra') {
      const obj = OBJECTS[rnd(0,OBJECTS.length-1)];
      const price = genPrice();
      const payment = pickPayment(price);
      prob = { type:'compra', obj, price, payment, total: payment-price };
    } else {
      const obj = OBJECTS[rnd(0,OBJECTS.length-1)];
      const price = genPrice();
      const ahorro = Math.max(0, price - rnd(1, Math.max(1,Math.floor(price/100)))*100);
      prob = { type:'falta', obj, price, ahorro, total: price-ahorro };
    }
    spins=[0,0,0,0];
    render();
  }

  function fmtEuros(c) { return (c/100).toFixed(2).replace('.',','); }

  function renderCoin(v) {
    const d = DENOMS[v];
    const cls = d.type==='bill' ? 'bill' : 'coin';
    return `<div class="${cls}"><span class="ico">${d.ico}</span>${d.label}</div>`;
  }

  function render() {
    let topHtml;
    if (prob.type === 'suma') {
      topHtml = `<div class="prob-text">Tienes estas monedas y billetes mágicos. ¿Cuánto dinero tienes en total?</div>
        <div class="coin-row">${prob.items.map(renderCoin).join('')}</div>`;
    } else if (prob.type === 'compra') {
      topHtml = `<div class="prob-text">${prob.obj.emoji} Quieres comprar ${prob.obj.name} que cuesta <strong>${fmtEuros(prob.price)} €</strong>.<br>
        Pagas con un billete/moneda de <strong>${fmtEuros(prob.payment)} €</strong>. ¿Cuánto te devuelven?</div>
        <div class="coin-row">${renderCoin(prob.payment)}</div>`;
    } else {
      topHtml = `<div class="prob-text">${prob.obj.emoji} ${prob.obj.name.charAt(0).toUpperCase()+prob.obj.name.slice(1)} cuesta <strong>${fmtEuros(prob.price)} €</strong>.<br>
        Tienes ahorrados <strong>${fmtEuros(prob.ahorro)} €</strong>. ¿Cuánto dinero te falta?</div>`;
    }

    document.getElementById('problemCard').innerHTML = `
      ${topHtml}
      <div class="answer-row">
        <div class="answer-block">
          <div class="answer-label">Euros (€)</div>
          <div class="digit-pair">
            <div class="spin-wrap"><button class="spin-btn" onclick="adjSpin(0,1)">▲</button><div class="spin-val" id="spin0" onclick="adjSpin(0,1)">0</div><button class="spin-btn down" onclick="adjSpin(0,-1)">▼</button></div>
            <div class="spin-wrap"><button class="spin-btn" onclick="adjSpin(1,1)">▲</button><div class="spin-val" id="spin1" onclick="adjSpin(1,1)">0</div><button class="spin-btn down" onclick="adjSpin(1,-1)">▼</button></div>
          </div>
        </div>
        <div class="answer-block">
          <div class="answer-label">Céntimos (c)</div>
          <div class="digit-pair">
            <div class="spin-wrap"><button class="spin-btn" onclick="adjSpin(2,1)">▲</button><div class="spin-val" id="spin2" onclick="adjSpin(2,1)">0</div><button class="spin-btn down" onclick="adjSpin(2,-1)">▼</button></div>
            <div class="spin-wrap"><button class="spin-btn" onclick="adjSpin(3,1)">▲</button><div class="spin-val" id="spin3" onclick="adjSpin(3,1)">0</div><button class="spin-btn down" onclick="adjSpin(3,-1)">▼</button></div>
          </div>
        </div>
      </div>`;
  }

  function adjSpin(i, delta) {
    const el = document.getElementById('spin'+i); if(!el) return;
    el.classList.remove('correct','wrong');
    spins[i] = (spins[i]+delta+10)%10;
    el.textContent = spins[i];
  }

  function checkAnswer() {
    document.getElementById('checkBtn').disabled = true;
    const euros = Math.floor(prob.total/100), cents = prob.total%100;
    const target = [Math.floor(euros/10), euros%10, Math.floor(cents/10), cents%10];
    let allOk = true;
    for(let i=0;i<4;i++){
      const el=document.getElementById('spin'+i);
      if(spins[i]===target[i]) el.classList.add('correct');
      else { el.classList.add('wrong'); allOk=false; }
    }
    if (allOk) {
      totalScore += (levelIdx+1)*10; streak++;
      document.getElementById('score').textContent = totalScore;
      showHat(); updateStreak();
      if(streak>=STREAK_NEEDED && levelIdx<3) {
        levelIdx++; streak=0;
        sessionStorage.setItem('mat30_level', levelIdx);
        document.getElementById('msgBox').textContent = `✨ ¡Subiste de nivel! Ahora eres ${LEVELS[levelIdx].name}`;
        updateLevelBadge();
      } else {
        document.getElementById('msgBox').textContent = `¡Perfecto! La respuesta es ${fmtEuros(prob.total)} €`;
      }
    } else {
      streak = 0; updateStreak(); Sound.wrong();
      document.getElementById('msgBox').textContent = `😕 La respuesta correcta era ${fmtEuros(prob.total)} €`;
      setTimeout(()=>document.getElementById('checkBtn').disabled=false,600);
    }
    document.getElementById('nextBtn').style.display='inline-block';
  }

  function newProblem() {
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('checkBtn').disabled=false;
    document.getElementById('msgBox').textContent='';
    if(questionCount >= MAX_QUESTIONS) {
      maybePodio('mat30', totalScore, MAX_QUESTIONS * 10);
    } else {
      genProblem();
    }
  }

  function showHat() {
    Sound.fanfare();
    const h=document.createElement('div'); h.className='hat-anim';
    h.textContent=['🧢','🎩','🪄','🧙'][levelIdx];
    document.body.appendChild(h); setTimeout(()=>h.remove(),900);
  }
  function updateLevelBadge() { document.getElementById('levelBadge').textContent=LEVELS[levelIdx].name; }
  function updateStreak() {
    document.getElementById('streakBar').innerHTML=Array.from({length:STREAK_NEEDED},(_,i)=>
      `<div class="streak-dot ${i<streak?'lit':''}"></div>`).join('');
  }

  updateLevelBadge(); updateStreak(); genProblem();
  </script>
</body>
</html>
