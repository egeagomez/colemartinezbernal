<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series y Comparaciones — Academia de Magia</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body { background: linear-gradient(135deg,#1a0533 0%,#2d004a 100%) fixed; }
    .hp-header { background: linear-gradient(135deg,#2d004a,#4a0072); border-bottom: 3px solid #FFD700; color: #FFD700; text-shadow: 0 0 12px #a020f0; }
    .hp-header .score-box { background:#4a0072; color:#FFD700; border:1px solid #7c43bd; }
    .level-badge { display:inline-block; background:#4a0072; color:#FFD700; border:2px solid #FFD700; border-radius:20px; padding:4px 18px; font-size:1rem; margin:6px 0; font-family:'Patrick Hand',cursive; }
    .streak-bar { display:flex; gap:6px; justify-content:center; margin:6px 0; }
    .streak-dot { width:18px; height:18px; border-radius:50%; background:#4a0072; border:2px solid #7c43bd; transition:background .3s; }
    .streak-dot.lit { background:#FFD700; border-color:#FFD700; }

    .problem-card {
      background:#fff; border-radius:16px; padding:18px 22px;
      max-width:520px; margin:10px auto;
      box-shadow:0 4px 20px rgba(160,32,240,.35);
      border:3px solid #7c43bd; font-family:'Patrick Hand',cursive;
    }
    .prob-text { font-size:1.15rem; color:#4a0072; text-align:center; margin-bottom:14px; line-height:1.55; }

    .serie-row { display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:wrap; margin:12px 0; }
    .serie-box { min-width:64px; height:60px; display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:bold; border-radius:12px; background:#f3e5f5; border:3px solid #ce93d8; color:#4a0072; }
    .serie-box.hidden { background:#fff8e1; border-color:#FFD700; }
    .serie-arrow { font-size:1.4rem; color:#7c43bd; }

    .compare-row { display:flex; gap:18px; justify-content:center; align-items:center; margin:14px 0; }
    .compare-num { font-size:2.4rem; font-weight:bold; color:#1a0533; min-width:90px; text-align:center; background:#f3e5f5; border:3px solid #ce93d8; border-radius:14px; padding:8px 14px; }

    .choice-row { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:14px 0; }
    .choice-btn { background:#f3e5f5; border:3px solid #ce93d8; border-radius:14px; padding:14px 26px; font-size:1.6rem; font-family:'Patrick Hand',cursive; cursor:pointer; color:#4a0072; transition:all .15s; min-width:70px; }
    .choice-btn:hover { background:#e1bee7; transform:scale(1.05); }
    .choice-btn.selected { background:#7c43bd; color:#fff; }
    .choice-btn.correct { background:#C8E6C9 !important; border-color:#4CAF50 !important; color:#2E7D32; }
    .choice-btn.wrong   { background:#FFCDD2 !important; border-color:#EF5350 !important; color:#c62828; animation:snake .4s; }

    .spin-wrap { display:flex; flex-direction:column; align-items:center; gap:0; }
    .spin-btn { width:52px; height:24px; background:#e1bee7; border:none; cursor:pointer; font-size:.95rem; border-radius:6px 6px 0 0; color:#4a0072; font-weight:bold; transition:background .1s; }
    .spin-btn.down { border-radius:0 0 6px 6px; }
    .spin-btn:hover { background:#ce93d8; }
    .spin-val { width:52px; height:52px; line-height:52px; text-align:center; font-size:2rem; font-family:'Patrick Hand',cursive; background:#fff; border:2px solid #7c43bd; color:#1a0533; user-select:none; cursor:pointer; transition:background .15s; }
    .spin-val.correct { background:#C8E6C9 !important; border-color:#4CAF50 !important; color:#2E7D32; }
    .spin-val.wrong   { background:#FFCDD2 !important; border-color:#EF5350 !important; color:#c62828; animation:snake .4s; }
    .spin-group { display:flex; gap:14px; justify-content:center; align-items:flex-end; flex-wrap:wrap; margin:10px 0; }
    .spin-col { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .spin-col-label { font-size:.85rem; color:#7c43bd; font-weight:bold; }

    .btn-magic { background: linear-gradient(135deg,#7c43bd,#ab47bc); color:#fff; border:none; border-radius:20px; padding:12px 32px; font-size:1.15rem; font-family:'Patrick Hand',cursive; cursor:pointer; box-shadow:0 4px 14px rgba(100,0,200,.4); transition:transform .1s; }
    .btn-gold { background:#FFD700; color:#2d004a; border:none; border-radius:20px; padding:12px 32px; font-size:1.15rem; font-family:'Patrick Hand',cursive; cursor:pointer; font-weight:bold; transition:transform .1s; }
    .btn-magic:hover,.btn-gold:hover { transform:scale(1.04); }
    #msgBox { min-height:1.6em; font-size:1.05rem; text-align:center; color:#FFD700; margin:8px 0; font-family:'Patrick Hand',cursive; }
    .instruction { color:#e1bee7 !important; }
    .game-area { background:rgba(255,255,255,.04); border:1px solid #4a0072; }
    @keyframes snake { 0%{transform:rotate(0)} 20%{transform:rotate(-6deg)} 40%{transform:rotate(6deg)} 60%{transform:rotate(-4deg)} 80%{transform:rotate(4deg)} 100%{transform:rotate(0)} }
    @keyframes hatPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.3) rotate(8deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
    .hat-anim { position:fixed; top:15%; left:50%; transform:translateX(-50%); font-size:5rem; z-index:999; pointer-events:none; animation:hatPop .7s ease forwards; }
  </style>
</head>
<body>
  <div class="game-header hp-header">
    <h1>📈 Series y Comparaciones</h1>
    <div class="score-box">🧙 <span id="score">0</span></div>
  </div>
  <div class="game-area">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div style="text-align:center">
      <div class="level-badge" id="levelBadge">🎓 Aprendiz</div>
      <div class="streak-bar" id="streakBar"></div>
      <p class="instruction">Completa la serie o compara los números con &lt;, &gt; o =.</p>
    </div>
    <div class="problem-card" id="problemCard"></div>
    <p id="msgBox"></p>
    <div style="text-align:center;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:8px">
      <button class="btn-magic" id="checkBtn" onclick="checkAnswer()">🔮 Comprobar</button>
      <button class="btn-gold"  id="nextBtn"  style="display:none" onclick="newProblem()">✨ Siguiente</button>
    </div>
  </div>
  <script src="../assets/score.js"></script>
  <script>
  const LEVELS = [
    {name:'🎓 Aprendiz'},{name:'⚡ Mago'},{name:'🌟 Archimago'},{name:'🧙 Brujo Experto'}
  ];
  let levelIdx = parseInt(sessionStorage.getItem('mat26_level')||'0');
  let streak = 0, totalScore = 0;
  const STREAK_NEEDED = 3;
  const MAX_QUESTIONS = 15;
  let questionCount = 0;

  function rnd(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }

  // Pasos posibles y rango máximo por nivel
  const STEPS_BY_LEVEL = [[1],[1,2],[5,10],[10,50,100]];
  const MAX_BY_LEVEL   = [50,100,500,999];

  let prob = {};
  let spins = [0,0,0];
  let selectedChoice = null;

  function genProblem() {
    questionCount++;
    document.getElementById('progressBar').style.width = (questionCount / MAX_QUESTIONS * 100) + '%';
    const type = (levelIdx===0) ? (Math.random()<0.65?'serie':'compara') : (Math.random()<0.5?'serie':'compara');
    if (type==='serie') genSerie(); else genCompara();
    spins=[0,0,0]; selectedChoice=null;
    render();
  }

  function genSerie() {
    const steps = STEPS_BY_LEVEL[levelIdx];
    const step = steps[rnd(0,steps.length-1)];
    const max = MAX_BY_LEVEL[levelIdx];
    let asc = (levelIdx===0) ? true : Math.random()<0.5;
    let nums = [];
    if (asc) {
      const start = rnd(0, Math.max(0, max - step*3));
      for(let i=0;i<4;i++) nums.push(start + step*i);
    } else {
      const start = rnd(step*3, max);
      for(let i=0;i<4;i++) nums.push(start - step*i);
    }
    const hideIdx = rnd(0,3);
    prob = { type:'serie', nums, step, asc, hideIdx, target: nums[hideIdx] };
  }

  function genCompara() {
    const max = MAX_BY_LEVEL[levelIdx];
    let a = rnd(0,max), b = rnd(0,max);
    if (Math.random() < 0.12) b = a; // a veces iguales
    let answer = a>b ? '>' : (a<b ? '<' : '=');
    prob = { type:'compara', a, b, answer };
  }

  function render() {
    const card = document.getElementById('problemCard');
    if (prob.type === 'serie') {
      const dirTxt = prob.asc ? 'va sumando' : 'va restando';
      let html = `<div class="prob-text">Esta serie ${dirTxt} <strong>${prob.step}</strong>. Descubre el número que falta.</div>
        <div class="serie-row">`;
      for(let i=0;i<4;i++){
        if(i>0) html += `<span class="serie-arrow">→</span>`;
        if(i===prob.hideIdx) html += `<div class="serie-box hidden">?</div>`;
        else html += `<div class="serie-box">${prob.nums[i]}</div>`;
      }
      html += `</div>
        <div class="spin-group">
          <div class="spin-col"><div class="spin-col-label">Centenas</div>
            <div class="spin-wrap"><button class="spin-btn" onclick="adjSpin(0,1)">▲</button><div class="spin-val" id="spin0" onclick="adjSpin(0,1)">0</div><button class="spin-btn down" onclick="adjSpin(0,-1)">▼</button></div></div>
          <div class="spin-col"><div class="spin-col-label">Decenas</div>
            <div class="spin-wrap"><button class="spin-btn" onclick="adjSpin(1,1)">▲</button><div class="spin-val" id="spin1" onclick="adjSpin(1,1)">0</div><button class="spin-btn down" onclick="adjSpin(1,-1)">▼</button></div></div>
          <div class="spin-col"><div class="spin-col-label">Unidades</div>
            <div class="spin-wrap"><button class="spin-btn" onclick="adjSpin(2,1)">▲</button><div class="spin-val" id="spin2" onclick="adjSpin(2,1)">0</div><button class="spin-btn down" onclick="adjSpin(2,-1)">▼</button></div></div>
        </div>`;
      card.innerHTML = html;
    } else {
      card.innerHTML = `
        <div class="prob-text">Compara los dos números. ¿Qué signo va en el medio?</div>
        <div class="compare-row">
          <div class="compare-num">${prob.a}</div>
          <div id="signBox" style="font-size:2rem;color:#7c43bd;min-width:50px;text-align:center;">?</div>
          <div class="compare-num">${prob.b}</div>
        </div>
        <div class="choice-row">
          <button class="choice-btn" data-v="&gt;" onclick="selectChoice('&gt;')">&gt;</button>
          <button class="choice-btn" data-v="=" onclick="selectChoice('=')">=</button>
          <button class="choice-btn" data-v="&lt;" onclick="selectChoice('&lt;')">&lt;</button>
        </div>`;
    }
  }

  function adjSpin(i, delta) {
    const el = document.getElementById('spin'+i); if(!el) return;
    el.classList.remove('correct','wrong');
    spins[i] = (spins[i]+delta+10)%10;
    el.textContent = spins[i];
  }

  function selectChoice(v) {
    selectedChoice = v;
    document.querySelectorAll('.choice-btn').forEach(b=>{
      b.classList.remove('selected','correct','wrong');
      if(b.dataset.v===v) b.classList.add('selected');
    });
  }

  function checkAnswer() {
    document.getElementById('checkBtn').disabled = true;
    let correct;
    if (prob.type === 'serie') {
      const c=Math.floor(prob.target/100), d=Math.floor((prob.target%100)/10), u=prob.target%10;
      const target=[c,d,u];
      let allOk=true;
      for(let i=0;i<3;i++){
        const el=document.getElementById('spin'+i);
        if(spins[i]===target[i]) el.classList.add('correct');
        else { el.classList.add('wrong'); allOk=false; }
      }
      correct = allOk;
      if(!correct) document.getElementById('msgBox').textContent = `😕 El número que faltaba era ${prob.target}`;
      else document.getElementById('signBox')?.remove();
    } else {
      correct = (selectedChoice === prob.answer);
      document.querySelectorAll('.choice-btn').forEach(b=>{
        if(b.dataset.v===prob.answer) b.classList.add('correct');
        else if(b.dataset.v===selectedChoice) b.classList.add('wrong');
      });
      document.getElementById('signBox').textContent = prob.answer;
      if(!correct) document.getElementById('msgBox').textContent = `😕 ${prob.a} ${prob.answer} ${prob.b}`;
    }

    if (correct) {
      totalScore += (levelIdx+1)*10; streak++;
      document.getElementById('score').textContent = totalScore;
      showHat(); updateStreak();
      if(streak>=STREAK_NEEDED && levelIdx<3) {
        levelIdx++; streak=0;
        sessionStorage.setItem('mat26_level', levelIdx);
        document.getElementById('msgBox').textContent = `✨ ¡Subiste de nivel! Ahora eres ${LEVELS[levelIdx].name}`;
        updateLevelBadge();
      } else {
        document.getElementById('msgBox').textContent = ['¡Perfecto! 🎉','¡Excelente! ⚡','¡Brillante! 🌟','¡Mágico! 🧙'][levelIdx];
      }
    } else {
      streak = 0; updateStreak(); Sound.wrong();
      setTimeout(()=>document.getElementById('checkBtn').disabled=false,600);
    }
    document.getElementById('nextBtn').style.display='inline-block';
  }

  function newProblem() {
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('checkBtn').disabled=false;
    document.getElementById('msgBox').textContent='';
    if(questionCount >= MAX_QUESTIONS) {
      maybePodio('mat26', totalScore, MAX_QUESTIONS * 10);
    } else {
      genProblem();
    }
  }

  function showHat() {
    Sound.fanfare();
    const h=document.createElement('div'); h.className='hat-anim';
    h.textContent=['🧢','🎩','🪄','🧙'][levelIdx];
    document.body.appendChild(h); setTimeout(()=>h.remove(),900);
  }
  function updateLevelBadge() { document.getElementById('levelBadge').textContent=LEVELS[levelIdx].name; }
  function updateStreak() {
    document.getElementById('streakBar').innerHTML=Array.from({length:STREAK_NEEDED},(_,i)=>
      `<div class="streak-dot ${i<streak?'lit':''}"></div>`).join('');
  }

  updateLevelBadge(); updateStreak(); genProblem();
  </script>
</body>
</html>
