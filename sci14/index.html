<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏆 Structures Quiz</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#0d1b2a,#1b2a3b) fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.top-bar{width:100%;max-width:680px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.back-btn{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:14px;padding:5px 14px;font-family:inherit;font-size:.9rem;cursor:pointer;text-decoration:none}
.back-btn:hover{background:#2979ff}
.score-box{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:20px;padding:4px 16px;font-size:1rem}
.phase-bar{display:flex;gap:6px;margin:6px 0 14px;flex-wrap:wrap;justify-content:center}
.p-tab{padding:6px 16px;border-radius:20px;font-family:inherit;font-size:.88rem;border:2px solid #2979ff;background:#0d1b2a;color:#7eb3ff;cursor:default}
.p-tab.active{background:#2979ff;color:#fff;font-weight:bold}
.p-tab.done{background:#1b5e20;border-color:#4CAF50;color:#fff}
.phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:680px;padding:0 12px}
.phase.active{display:flex}
.ph-title{font-size:1.05rem;color:#90caf9;text-align:center;margin-bottom:10px}
.fb{min-height:2rem;font-size:1.05rem;text-align:center;margin:8px 0}
.fb.ok{color:#69f0ae}.fb.no{color:#ff5252}
.btn-go{background:linear-gradient(135deg,#1b5e20,#388E3C);color:#FFD700;border:2px solid #FFD700;border-radius:20px;padding:9px 28px;font-family:inherit;font-size:1rem;cursor:pointer;margin-top:8px}
.btn-go:hover{background:#4CAF50}
.flash-ov{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:50}
.flash-ov.g{background:rgba(76,175,80,.2);opacity:1}
.flash-ov.r{background:rgba(244,67,54,.2);opacity:1}
/* Review grid */
.review-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin-bottom:12px}
.rv-card{background:linear-gradient(145deg,#0f1f35,#18304e);border:2px solid #2979ff;border-radius:14px;padding:10px 4px;text-align:center;cursor:pointer;transition:border-color .15s}
.rv-card:hover{border-color:#FFD700}
.rv-em{font-size:1.8rem;display:block;margin-bottom:4px}
.rv-word{font-size:.75rem;color:#90caf9;line-height:1.3}
/* Quiz */
.q-box{width:100%;background:linear-gradient(145deg,#0f2040,#1a3a5c);border:3px solid #FFD700;border-radius:18px;padding:18px;text-align:center;margin-bottom:10px}
.q-em{font-size:3.5rem;display:block;margin-bottom:4px}
.q-text{font-size:1.2rem;font-weight:bold;color:#FFD700;margin:4px 0;line-height:1.4}
.q-prog{font-size:.85rem;color:#90caf9;margin-top:4px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.opt-grid.wide{grid-template-columns:1fr}
.opt-btn{background:linear-gradient(145deg,#0f1f35,#18304e);border:2px solid #2979ff;border-radius:14px;padding:12px 8px;cursor:pointer;font-family:inherit;font-size:.93rem;color:#fff;font-weight:bold;transition:transform .1s;line-height:1.3}
.opt-btn:hover:not([disabled]){transform:scale(1.04);border-color:#90caf9}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{border-color:#69f0ae!important;background:rgba(105,240,174,.2)!important;color:#69f0ae!important}
.opt-btn.wrong{opacity:.3!important;border-color:#f44336!important;text-decoration:line-through}
/* Speed round */
.speed-bar{width:100%;background:#1a3a5c;border-radius:10px;height:10px;margin-bottom:10px;overflow:hidden}
.speed-fill{height:100%;background:linear-gradient(90deg,#69f0ae,#FFD700);transition:width 1s linear;border-radius:10px}
.opt-em{font-size:2rem;display:block;margin-bottom:2px}
.fin{background:#0a2010;border:2px solid #4CAF50;border-radius:16px;padding:22px;text-align:center;width:100%}
.recommend{margin-top:12px;background:rgba(255,215,0,.08);border:2px solid #FFD700;border-radius:14px;padding:12px;font-size:.95rem;line-height:1.6}
.missed-list{margin-top:8px;font-size:.9rem;color:#ff5252;text-align:left;padding-left:8px}
</style>
</head>
<body>
<div class="flash-ov" id="fov"></div>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← Home</a>
  <span style="color:#FFD700;font-size:1.05rem">🏆 Structures Quiz</span>
  <div class="score-box">⭐ <span id="scoreDisp">0</span></div>
</div>
<div class="phase-bar">
  <div class="p-tab active" id="tab1">👀 Review</div>
  <div class="p-tab" id="tab2">🎯 Quiz</div>
  <div class="p-tab" id="tab3">⚡ Speed!</div>
</div>

<!-- Phase 1: Review grid -->
<div class="phase active" id="phase1">
  <p class="ph-title">Review all vocabulary! Tap any card to hear it. 👀</p>
  <div class="review-grid" id="reviewGrid"></div>
  <div class="fb" id="fb1"></div>
  <button class="btn-go" onclick="goTab(2)">🎯 Start Quiz! →</button>
</div>

<!-- Phase 2: Mixed quiz -->
<div class="phase" id="phase2">
  <p class="ph-title">What is this? Choose the right answer! 🎯</p>
  <div class="q-box">
    <span class="q-em" id="q2Em"></span>
    <div class="q-text" id="q2Text"></div>
    <div class="q-prog" id="q2Prog">Question 1 of 14</div>
  </div>
  <div class="opt-grid" id="q2Grid"></div>
  <div class="fb" id="fb2"></div>
</div>

<!-- Phase 3: Speed round -->
<div class="phase" id="phase3">
  <p class="ph-title">Speed round! Find the right emoji fast! ⚡</p>
  <div class="speed-bar"><div class="speed-fill" id="speedFill" style="width:100%"></div></div>
  <div class="q-box">
    <div class="q-text" id="q3Text"></div>
    <div class="q-prog" id="q3Prog">Question 1 of 14</div>
  </div>
  <div class="opt-grid" id="q3Grid"></div>
  <div class="fb" id="fb3"></div>
  <div class="fin" id="fin" style="display:none">
    <div style="font-size:3rem">🏆</div>
    <div style="font-size:1.4rem;color:#69f0ae;font-weight:bold;margin:8px 0">Structures champion!</div>
    <div style="color:#90caf9">Score: <strong style="color:#FFD700" id="finSc"></strong> ⭐</div>
    <div class="recommend" id="recommend"></div>
    <a href="../index.html" style="display:inline-block;margin-top:14px;padding:10px 28px;background:#FFD700;color:#0d1b2a;border-radius:20px;font-weight:bold;text-decoration:none;font-family:inherit">🏠 Home</a>
  </div>
</div>

<script>
const ALL = [
  { word:'nest',       em:'🪺', es:'nido',               cat:'structure' },
  { word:'beaver dam', em:'🦫', es:'presa de castor',    cat:'structure' },
  { word:'tree trunk', em:'🪵', es:'tronco de árbol',    cat:'structure' },
  { word:'shell',      em:'🐚', es:'concha',             cat:'structure' },
  { word:'cave',       em:'🏔️', es:'cueva',              cat:'structure' },
  { word:'skeleton',   em:'💀', es:'esqueleto',          cat:'structure' },
  { word:'bridge',     em:'🌉', es:'puente',             cat:'structure' },
  { word:'ladder',     em:'🪜', es:'escalera',           cat:'structure' },
  { word:'stretch',    em:'🤸', es:'estirar',            cat:'verb' },
  { word:'pull',       em:'💪', es:'tirar de',           cat:'verb' },
  { word:'push',       em:'📦', es:'empujar',            cat:'verb' },
  { word:'spin',       em:'🌀', es:'girar',              cat:'verb' },
  { word:'fold',       em:'📋', es:'doblar',             cat:'verb' },
  { word:'bend',       em:'↩️', es:'torcer',             cat:'verb' },
];

let score=0;
let q2Order=[], q2N=0, q2OK=0, q2Missed=[];
let q3Order=[], q3N=0, q3OK=0, q3Missed=[];
let speedTimer=null;
const SPEED_SEC=8;
let speedLeft=SPEED_SEC;

const upScore=n=>{score+=n;document.getElementById('scoreDisp').textContent=score;};
const flash=ok=>{const e=document.getElementById('fov');e.className='flash-ov '+(ok?'g':'r');setTimeout(()=>e.className='flash-ov',300);};
const speak=t=>{const u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);};
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};

function goTab(n){
  clearInterval(speedTimer);
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.getElementById('phase'+n).classList.add('active');
  document.querySelectorAll('.p-tab').forEach((t,i)=>{t.classList.remove('active','done');if(i+1<n)t.classList.add('done');});
  document.getElementById('tab'+n).classList.add('active');
  if(n===2)initQ2();
  if(n===3)initQ3();
}

document.getElementById('reviewGrid').innerHTML=ALL.map(a=>
  '<div class="rv-card" onclick="speak(\''+a.word+'\')">'+
  '<span class="rv-em">'+a.em+'</span>'+
  '<div class="rv-word">'+a.word+'</div>'+
  '</div>').join('');

function initQ2(){q2N=0;q2OK=0;q2Missed=[];q2Order=shuffle(ALL.map((_,i)=>i));nextQ2();}
function nextQ2(){
  if(q2N>=ALL.length){
    document.getElementById('tab2').classList.add('done');
    document.getElementById('fb2').className='fb ok';
    document.getElementById('fb2').innerHTML='🎉 '+q2OK+'/'+ALL.length+' correct!';
    setTimeout(()=>goTab(3),1400);return;
  }
  const ci=q2Order[q2N];
  document.getElementById('q2Em').textContent=ALL[ci].em;
  document.getElementById('q2Text').textContent='What is this?';
  document.getElementById('q2Prog').textContent='Question '+(q2N+1)+' of '+ALL.length;
  const pool=ALL.map((_,i)=>i).filter(i=>i!==ci&&ALL[i].cat===ALL[ci].cat);
  const wrongPool=pool.length>=3?pool:ALL.map((_,i)=>i).filter(i=>i!==ci);
  const opts=shuffle([ci,...shuffle(wrongPool).slice(0,3)]);
  document.getElementById('q2Grid').innerHTML=opts.map(oi=>
    '<button class="opt-btn" data-ci="'+oi+'" onclick="checkQ2(this,'+ci+')">'+ALL[oi].word+'</button>').join('');
  document.getElementById('fb2').textContent='';
}
function checkQ2(btn,ci){
  document.querySelectorAll('#q2Grid .opt-btn').forEach(b=>b.disabled=true);
  const ok=parseInt(btn.dataset.ci)===ci;
  if(ok){btn.classList.add('correct');q2OK++;upScore(10);flash(true);
    document.getElementById('fb2').className='fb ok';document.getElementById('fb2').textContent='✅ '+ALL[ci].word+'!';
    speak(ALL[ci].word);
  }else{btn.classList.add('wrong');
    document.querySelectorAll('#q2Grid .opt-btn').forEach(b=>{if(parseInt(b.dataset.ci)===ci)b.classList.add('correct');});
    flash(false);document.getElementById('fb2').className='fb no';document.getElementById('fb2').textContent='❌ It was: '+ALL[ci].word;
    q2Missed.push(ALL[ci].word);
  }
  q2N++;setTimeout(nextQ2,1600);
}

function initQ3(){q3N=0;q3OK=0;q3Missed=[];q3Order=shuffle(ALL.map((_,i)=>i));nextQ3();}
function nextQ3(){
  clearInterval(speedTimer);
  if(q3N>=ALL.length){
    document.getElementById('fin').style.display='block';
    document.getElementById('finSc').textContent=score;
    showRecommend(q2OK+q3OK,ALL.length*2,[...new Set([...q2Missed,...q3Missed])]);return;
  }
  const ci=q3Order[q3N];
  document.getElementById('q3Text').textContent=ALL[ci].word;
  document.getElementById('q3Prog').textContent='Question '+(q3N+1)+' of '+ALL.length;
  const pool=ALL.map((_,i)=>i).filter(i=>i!==ci&&ALL[i].cat===ALL[ci].cat);
  const wrongPool=pool.length>=3?pool:ALL.map((_,i)=>i).filter(i=>i!==ci);
  const opts=shuffle([ci,...shuffle(wrongPool).slice(0,3)]);
  document.getElementById('q3Grid').innerHTML=opts.map(oi=>
    '<button class="opt-btn" data-ci="'+oi+'" onclick="checkQ3(this,'+ci+')"><span class="opt-em">'+ALL[oi].em+'</span></button>').join('');
  document.getElementById('fb3').textContent='';
  speedLeft=SPEED_SEC;
  document.getElementById('speedFill').style.transition='none';
  document.getElementById('speedFill').style.width='100%';
  setTimeout(()=>{
    document.getElementById('speedFill').style.transition='width '+SPEED_SEC+'s linear';
    document.getElementById('speedFill').style.width='0%';
  },50);
  speedTimer=setInterval(()=>{speedLeft--;if(speedLeft<=0){clearInterval(speedTimer);timeOut(ci);}},1000);
}
function timeOut(ci){
  document.querySelectorAll('#q3Grid .opt-btn').forEach(b=>{b.disabled=true;if(parseInt(b.dataset.ci)===ci)b.classList.add('correct');});
  flash(false);
  document.getElementById('fb3').className='fb no';document.getElementById('fb3').textContent='⏰ Time! It was: '+ALL[ci].em+' '+ALL[ci].word;
  q3Missed.push(ALL[ci].word);
  q3N++;setTimeout(nextQ3,1800);
}
function checkQ3(btn,ci){
  clearInterval(speedTimer);
  document.querySelectorAll('#q3Grid .opt-btn').forEach(b=>b.disabled=true);
  document.getElementById('speedFill').style.transition='none';
  document.getElementById('speedFill').style.width='100%';
  const ok=parseInt(btn.dataset.ci)===ci;
  if(ok){btn.classList.add('correct');q3OK++;upScore(speedLeft>=6?15:speedLeft>=3?12:10);flash(true);
    document.getElementById('fb3').className='fb ok';document.getElementById('fb3').textContent='✅ '+ALL[ci].word+'!';
    speak(ALL[ci].word);
  }else{btn.classList.add('wrong');
    document.querySelectorAll('#q3Grid .opt-btn').forEach(b=>{if(parseInt(b.dataset.ci)===ci)b.classList.add('correct');});
    flash(false);document.getElementById('fb3').className='fb no';document.getElementById('fb3').textContent='❌ It was: '+ALL[ci].em+' '+ALL[ci].word;
    q3Missed.push(ALL[ci].word);
  }
  q3N++;setTimeout(nextQ3,1600);
}

function showRecommend(ok,total,missed){
  const pct=Math.round(ok/total*100);
  const el=document.getElementById('recommend');
  let html='';
  if(pct>=80)html='<b style="color:#69f0ae">Excellent! '+pct+'%</b><br>You know all the structures and verbs! Ready for the Grand Review (eng23)! 🌟';
  else if(pct>=60){
    html='<b style="color:#FFD700">Good! '+pct+'%</b><br>Review a bit more before the grand review. 📖';
    if(missed.length)html+='<div class="missed-list">Practise these:<br>'+missed.map(m=>'• '+m).join('<br>')+'</div>';
  }else{
    html='<b style="color:#ff5252">Keep practising! '+pct+'%</b><br>Go back to eng18–eng21 to review all structures and movement verbs. 💪';
    if(missed.length)html+='<div class="missed-list">These were tricky:<br>'+missed.map(m=>'• '+m).join('<br>')+'</div>';
  }
  el.innerHTML=html;
}
</script>
</body>
</html>
