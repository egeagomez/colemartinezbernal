<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>💬 I Want To!</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#0d1b2a,#1b2a3b) fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:32px}
.top-bar{width:100%;max-width:660px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.back-btn{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:14px;padding:5px 14px;font-family:inherit;font-size:.9rem;cursor:pointer;text-decoration:none}
.back-btn:hover{background:#2979ff}
.score-box{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:20px;padding:4px 16px;font-size:1rem}
.phase-bar{display:flex;gap:6px;margin:6px 0 14px;flex-wrap:wrap;justify-content:center}
.p-tab{padding:6px 16px;border-radius:20px;font-family:inherit;font-size:.88rem;border:2px solid #2979ff;background:#0d1b2a;color:#7eb3ff;cursor:default}
.p-tab.active{background:#2979ff;color:#fff;font-weight:bold}
.p-tab.done{background:#1b5e20;border-color:#4CAF50;color:#fff}
.phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:660px;padding:0 12px}
.phase.active{display:flex}
.ph-title{font-size:1.05rem;color:#90caf9;text-align:center;margin-bottom:10px}
.fb{min-height:2rem;font-size:1.05rem;text-align:center;margin:8px 0}
.fb.ok{color:#69f0ae}.fb.no{color:#ff5252}
.btn-go{background:linear-gradient(135deg,#1b5e20,#388E3C);color:#FFD700;border:2px solid #FFD700;border-radius:20px;padding:9px 28px;font-family:inherit;font-size:1rem;cursor:pointer;margin-top:8px}
.btn-go:hover{background:#4CAF50}.btn-go:disabled{opacity:.35;cursor:default}
.flash-ov{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:50}
.flash-ov.g{background:rgba(76,175,80,.2);opacity:1}
.flash-ov.r{background:rgba(244,67,54,.2);opacity:1}
/* Learn cards */
.learn-dots{display:flex;gap:7px;justify-content:center;margin-bottom:10px}
.l-dot{width:12px;height:12px;border-radius:50%;background:#1a3a5c;border:2px solid #2979ff}
.l-dot.cur{background:#FFD700}.l-dot.seen{background:#42a5f5}
.learn-card{width:100%;background:linear-gradient(145deg,#0f2040,#1a3a5c);border:3px solid #2979ff;border-radius:24px;padding:24px 20px;text-align:center;box-shadow:0 8px 28px rgba(41,121,255,.3)}
.lc-bubble{display:inline-block;background:linear-gradient(135deg,#1b5e20,#388E3C);border:3px solid #69f0ae;border-radius:20px 20px 20px 4px;padding:12px 20px;font-size:1.5rem;font-weight:bold;color:#fff;margin:10px 0}
.lc-bubble.neg{background:linear-gradient(135deg,#7f0000,#c62828);border-color:#ff5252}
.lc-name{font-size:1rem;color:#FFD700;margin-bottom:4px}
.lc-em{font-size:3rem;display:block;margin-bottom:4px}
.lc-es{font-size:1rem;color:#90caf9;font-style:italic;margin-top:8px}
.rule-box{background:rgba(41,121,255,.15);border:2px solid #2979ff;border-radius:12px;padding:10px 16px;margin-top:10px;font-size:.95rem;color:#90caf9}
.learn-nav{display:flex;align-items:center;gap:16px;margin:12px 0 6px;justify-content:center}
.nav-btn{background:#1a3a5c;color:#FFD700;border:2px solid #2979ff;border-radius:50%;width:44px;height:44px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#2979ff}.nav-btn:disabled{opacity:.3;cursor:default}
.spk-btn{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:2px solid #42a5f5;border-radius:20px;padding:7px 22px;font-family:inherit;font-size:.95rem;cursor:pointer}
/* Quiz */
.q-box{width:100%;background:linear-gradient(145deg,#0f2040,#1a3a5c);border:3px solid #FFD700;border-radius:18px;padding:16px;text-align:center;margin-bottom:10px}
.q-em{font-size:4rem;display:block;margin-bottom:4px}
.q-char{font-size:1.1rem;color:#FFD700;font-weight:bold;margin-bottom:6px}
.q-sentence{font-size:1.4rem;color:#fff;line-height:1.5;margin-bottom:6px}
.blank{display:inline-block;min-width:130px;border-bottom:3px solid #42a5f5;color:#FFD700;font-weight:bold;padding:0 6px}
.q-prog{font-size:.85rem;color:#90caf9}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.opt-btn{background:linear-gradient(145deg,#0f1f35,#18304e);border:2px solid #2979ff;border-radius:14px;padding:16px 8px;cursor:pointer;font-family:inherit;font-size:1.05rem;color:#fff;font-weight:bold;transition:transform .1s}
.opt-btn.pos{border-color:#69f0ae;background:linear-gradient(145deg,#0a2a14,#1a4a24)}
.opt-btn.neg{border-color:#ff5252;background:linear-gradient(145deg,#2a0a0a,#4a1414)}
.opt-btn:hover:not([disabled]){transform:scale(1.04)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{outline:4px solid #FFD700!important;box-shadow:0 0 14px rgba(255,215,0,.5)!important}
.opt-btn.wrong{opacity:.3!important;text-decoration:line-through}
/* Fill blank / Write */
.fill-card{width:100%;background:linear-gradient(145deg,#0f1f35,#18304e);border:3px solid #2979ff;border-radius:20px;padding:18px;margin-bottom:10px}
.fill-scene{font-size:3rem;text-align:center;margin-bottom:6px}
.fill-sentence{font-size:1.4rem;color:#fff;text-align:center;line-height:1.6;margin-bottom:16px}
.write-row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
.write-input{font-family:'Patrick Hand',cursive;font-size:1.1rem;padding:10px 14px;border-radius:14px;border:3px solid #42a5f5;background:#0d1b2a;color:#FFD700;width:220px;outline:none;text-align:center}
.write-input:focus{border-color:#FFD700}
.write-input:disabled{opacity:.6}
.check-btn{background:linear-gradient(135deg,#1b5e20,#388E3C);color:#FFD700;border:2px solid #FFD700;border-radius:14px;padding:10px 20px;font-family:inherit;font-size:1rem;cursor:pointer}
.check-btn:disabled{opacity:.35;cursor:default}
.fin{background:#0a2010;border:2px solid #4CAF50;border-radius:16px;padding:22px;text-align:center;width:100%}
.recommend{margin-top:12px;background:rgba(255,215,0,.08);border:2px solid #FFD700;border-radius:14px;padding:12px;font-size:.98rem;line-height:1.6}
</style>
</head>
<body>
<div class="flash-ov" id="fov"></div>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← Home</a>
  <span style="color:#FFD700;font-size:1.05rem">💬 I Want To!</span>
  <div class="score-box">⭐ <span id="scoreDisp">0</span></div>
</div>
<div class="phase-bar">
  <div class="p-tab active" id="tab1">📖 Learn</div>
  <div class="p-tab" id="tab2">✅ Want or not?</div>
  <div class="p-tab" id="tab3">✍️ Fill In</div>
</div>

<!-- Phase 1: Learn grammar -->
<div class="phase active" id="phase1">
  <p class="ph-title">Learn how to say what you want to do! 💬</p>
  <div class="learn-dots" id="lDots"></div>
  <div class="learn-card" id="lCard"></div>
  <div class="learn-nav">
    <button class="nav-btn" id="lP" onclick="lcMove(-1)">◀</button>
    <span style="color:#90caf9;font-size:.9rem" id="lCnt">1 / 6</span>
    <button class="nav-btn" id="lN" onclick="lcMove(1)">▶</button>
  </div>
  <button class="spk-btn" onclick="speakCard()">🔊 Listen</button>
  <div class="fb" id="fb1"></div>
  <button class="btn-go" id="btn1" onclick="goTab(2)" disabled>✅ Start Practice! →</button>
</div>

<!-- Phase 2: want or don't want? -->
<div class="phase" id="phase2">
  <p class="ph-title">Does the person want to do this activity? 🤔</p>
  <div class="q-box">
    <span class="q-em" id="q2Em"></span>
    <div class="q-char" id="q2Char"></div>
    <div class="q-sentence" id="q2Sentence"></div>
    <div class="q-prog" id="q2Prog">Question 1 of 10</div>
  </div>
  <div class="opt-grid">
    <button class="opt-btn pos" id="q2Yes" onclick="checkQ2(true)">✅ I want to</button>
    <button class="opt-btn neg" id="q2No"  onclick="checkQ2(false)">❌ I don't want to</button>
  </div>
  <div class="fb" id="fb2"></div>
</div>

<!-- Phase 3: write in the blank -->
<div class="phase" id="phase3">
  <p class="ph-title">Type the missing words! ✍️</p>
  <div class="fill-card">
    <div class="fill-scene" id="f3Scene"></div>
    <div class="fill-sentence" id="f3Sent"></div>
    <div class="write-row">
      <input class="write-input" type="text" id="f3Input" placeholder="want to / don't want to" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="check-btn" id="f3Btn" onclick="checkF3()">✅ Check</button>
    </div>
  </div>
  <div style="font-size:.85rem;color:#90caf9;margin-bottom:4px" id="f3Prog">Sentence 1 of 8</div>
  <div class="fb" id="fb3"></div>
  <div class="fin" id="fin" style="display:none">
    <div style="font-size:3rem">🎉</div>
    <div style="font-size:1.4rem;color:#69f0ae;font-weight:bold;margin:8px 0">Great grammar!</div>
    <div style="color:#90caf9">Score: <strong style="color:#FFD700" id="finSc"></strong> ⭐</div>
    <div class="recommend" id="recommend"></div>
    <a href="../index.html" style="display:inline-block;margin-top:14px;padding:10px 28px;background:#FFD700;color:#0d1b2a;border-radius:20px;font-weight:bold;text-decoration:none;font-family:inherit">🏠 Home</a>
  </div>
</div>

<script>
const LEARN = [
  { sentence:'I want to climb a tree.',     es:'Quiero trepar a un árbol.',      em:'🧗', neg:false },
  { sentence:'I want to do yoga.',          es:'Quiero hacer yoga.',             em:'🧘', neg:false },
  { sentence:"I don't want to swim.",       es:'No quiero nadar.',               em:'🏊', neg:true  },
  { sentence:"I don't want to play basketball.", es:'No quiero jugar al baloncesto.', em:'🏀', neg:true },
  { sentence:'I want to read a comic.',     es:'Quiero leer un cómic.',          em:'📖', neg:false },
  { sentence:"I don't want to make a model.", es:'No quiero construir una maqueta.', em:'🏗️', neg:true },
];

const Q2_DATA = [
  { em:'🏊', name:'Sam',   sentence:'Sam wants to swim.',               wants:true  },
  { em:'🧘', name:'Lily',  sentence:"Lily doesn't want to do yoga.",    wants:false },
  { em:'🏐', name:'Jack',  sentence:'Jack wants to play volleyball.',   wants:true  },
  { em:'⛵', name:'Emma',  sentence:"Emma doesn't want to sail a boat.",wants:false },
  { em:'🎸', name:'Tom',   sentence:'Tom wants to play the guitar.',    wants:true  },
  { em:'🏀', name:'Mia',   sentence:"Mia doesn't want to play basketball.", wants:false },
  { em:'🚶', name:'Leo',   sentence:'Leo wants to go for a walk.',     wants:true  },
  { em:'🎲', name:'Rosa',  sentence:"Rosa doesn't want to play a board game.", wants:false },
  { em:'🏓', name:'Ben',   sentence:'Ben wants to play table tennis.',  wants:true  },
  { em:'📖', name:'Grace', sentence:"Grace doesn't want to read a comic.", wants:false },
];

const FILL_Q = [
  { scene:'🧗', sentence:'I ___ climb a tree.',        correct:'want to',     options:['want to','don\'t want to'] },
  { scene:'🏊', sentence:"I ___ swim in the lake.",    correct:"don't want to",options:['want to','don\'t want to'] },
  { scene:'🎸', sentence:'I ___ play the guitar.',     correct:'want to',     options:['want to','don\'t want to'] },
  { scene:'🏐', sentence:"I ___ play volleyball.",     correct:"don't want to",options:['want to','don\'t want to'] },
  { scene:'📖', sentence:'I ___ read a comic.',        correct:'want to',     options:['want to','don\'t want to'] },
  { scene:'🏀', sentence:"I ___ play basketball.",     correct:"don't want to",options:['want to','don\'t want to'] },
  { scene:'🚶', sentence:'I ___ go for a walk.',       correct:'want to',     options:['want to','don\'t want to'] },
  { scene:'🎲', sentence:"I ___ play a board game.",   correct:"don't want to",options:['want to','don\'t want to'] },
];

let score=0, lcIdx=0, lcSeen=new Set();
let q2Order=[],q2N=0,q2OK=0;
let f3N=0,f3OK=0;

const upScore=n=>{score+=n;document.getElementById('scoreDisp').textContent=score;};
const flash=ok=>{const e=document.getElementById('fov');e.className='flash-ov '+(ok?'g':'r');setTimeout(()=>e.className='flash-ov',300);};
const speak=t=>{const u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);};
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};

function goTab(n){
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.getElementById('phase'+n).classList.add('active');
  document.querySelectorAll('.p-tab').forEach((t,i)=>{t.classList.remove('active','done');if(i+1<n)t.classList.add('done');});
  document.getElementById('tab'+n).classList.add('active');
  if(n===2)initQ2();
  if(n===3)initF3();
}

// Phase 1: Learn
function lcRender(){
  const l=LEARN[lcIdx];
  document.getElementById('lCard').innerHTML=`
    <span class="lc-em">${l.em}</span>
    <div class="lc-bubble${l.neg?' neg':''}">${l.sentence}</div>
    <div class="lc-es">${l.es}</div>
    <div class="rule-box">📌 I + <b>${l.neg?'DON\'T WANT TO':'WANT TO'}</b> + activity</div>`;
  document.getElementById('lCnt').textContent=(lcIdx+1)+' / '+LEARN.length;
  document.getElementById('lP').disabled=lcIdx===0;
  document.getElementById('lN').disabled=lcIdx===LEARN.length-1;
  lcSeen.add(lcIdx);
  document.getElementById('lDots').innerHTML=LEARN.map((_,i)=>`<div class="l-dot${i===lcIdx?' cur':lcSeen.has(i)?' seen':''}"></div>`).join('');
  if(lcSeen.size===LEARN.length){
    document.getElementById('btn1').disabled=false;
    const f=document.getElementById('fb1');f.className='fb ok';f.textContent='✅ All seen! Ready to practice!';
  }
}
function lcMove(d){lcIdx=Math.max(0,Math.min(LEARN.length-1,lcIdx+d));lcRender();}
function speakCard(){speak(LEARN[lcIdx].sentence);}
lcRender();

// Phase 2: want or don't want
let q2CurOrder=[],q2CurIdx=0;
function initQ2(){q2N=0;q2OK=0;q2CurOrder=shuffle(Q2_DATA.map((_,i)=>i));nextQ2();}
function nextQ2(){
  if(q2N>=Q2_DATA.length){
    document.getElementById('tab2').classList.add('done');
    const f=document.getElementById('fb2');f.className='fb ok';
    f.innerHTML='🎉 '+q2OK+'/'+Q2_DATA.length+' correct!';
    setTimeout(()=>goTab(3),1400);return;
  }
  const d=Q2_DATA[q2CurOrder[q2N]];
  document.getElementById('q2Em').textContent=d.em;
  document.getElementById('q2Char').textContent=d.name;
  document.getElementById('q2Sentence').innerHTML='<em>"'+d.sentence+'"</em>';
  document.getElementById('q2Prog').textContent='Question '+(q2N+1)+' of '+Q2_DATA.length;
  document.getElementById('q2Yes').disabled=false;
  document.getElementById('q2No').disabled=false;
  document.getElementById('q2Yes').classList.remove('correct','wrong');
  document.getElementById('q2No').classList.remove('correct','wrong');
  document.getElementById('fb2').textContent='';
}
function checkQ2(clicked){
  document.getElementById('q2Yes').disabled=true;
  document.getElementById('q2No').disabled=true;
  const d=Q2_DATA[q2CurOrder[q2N]];
  const ok=clicked===d.wants;
  const yesBtn=document.getElementById('q2Yes');
  const noBtn=document.getElementById('q2No');
  if(ok){
    (clicked?yesBtn:noBtn).classList.add('correct');
    q2OK++;upScore(10);flash(true);
    const answer=d.wants?'I want to.':'I don\'t want to.';
    const f=document.getElementById('fb2');f.className='fb ok';f.textContent='✅ '+answer;
    speak(d.sentence);
  }else{
    (clicked?yesBtn:noBtn).classList.add('wrong');
    (clicked?noBtn:yesBtn).classList.add('correct');
    flash(false);
    const f=document.getElementById('fb2');f.className='fb no';f.textContent='❌ '+d.sentence;
  }
  q2N++;setTimeout(nextQ2,1700);
}

// Phase 3: write the blank
let f3Order=[];
function initF3(){f3N=0;f3OK=0;f3Order=shuffle(FILL_Q.map((_,i)=>i));nextF3();}
function nextF3(){
  if(f3N>=FILL_Q.length){
    document.getElementById('fin').style.display='block';
    document.getElementById('finSc').textContent=score;
    showRecommend(q2OK+f3OK, Q2_DATA.length+FILL_Q.length);
    return;
  }
  const q=FILL_Q[f3Order[f3N]];
  document.getElementById('f3Scene').textContent=q.scene;
  document.getElementById('f3Sent').innerHTML=q.sentence.replace('___','<span class="blank">___</span>');
  document.getElementById('f3Prog').textContent='Sentence '+(f3N+1)+' of '+FILL_Q.length;
  document.getElementById('fb3').className='fb';document.getElementById('fb3').textContent='';
  const inp=document.getElementById('f3Input');
  inp.value='';inp.disabled=false;
  document.getElementById('f3Btn').disabled=false;
  setTimeout(()=>inp.focus(),120);
}
function checkF3(){
  const inp=document.getElementById('f3Input');
  const q=FILL_Q[f3Order[f3N]];
  const userAns=inp.value.trim().toLowerCase().replace(/\s+/g,' ');
  const correct=q.correct.toLowerCase();
  const ok=userAns===correct;
  const full=q.sentence.replace('___',q.correct);
  inp.disabled=true;
  document.getElementById('f3Btn').disabled=true;
  if(ok){
    f3OK++;upScore(10);flash(true);
    document.getElementById('f3Sent').innerHTML=full.replace(q.correct,`<span style="color:#69f0ae;font-weight:bold">${q.correct}</span>`);
    document.getElementById('fb3').className='fb ok';document.getElementById('fb3').textContent='✅ Correct!';
    speak(full);
  }else{
    flash(false);
    document.getElementById('f3Sent').innerHTML=full.replace(q.correct,`<span style="color:#69f0ae;font-weight:bold">${q.correct}</span>`);
    document.getElementById('fb3').className='fb no';document.getElementById('fb3').textContent='❌ The answer is: '+q.correct;
  }
  f3N++;setTimeout(nextF3,1800);
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!document.getElementById('f3Btn').disabled&&document.getElementById('phase3').classList.contains('active'))checkF3();
});

function showRecommend(ok,total){
  const pct=Math.round(ok/total*100);
  const el=document.getElementById('recommend');
  if(pct>=80)el.innerHTML=`<b style="color:#69f0ae">Excellent! ${pct}%</b><br>You know "I want to / I don't want to" perfectly! 🌟`;
  else if(pct>=60)el.innerHTML=`<b style="color:#FFD700">Good! ${pct}%</b><br>Review: <em>I WANT TO + activity</em> and <em>I DON'T WANT TO + activity</em> 📖`;
  else el.innerHTML=`<b style="color:#ff5252">Keep practising! ${pct}%</b><br>Remember: ✅ I <b>want to</b> swim. ❌ I <b>don't want to</b> swim. 💪`;
}
</script>
</body>
</html>
