<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego 6 – Las tildes viajeras</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .sentence-area {
      font-size:2rem; line-height:3rem;
      margin:20px auto; max-width:680px; text-align:center;
    }
    /* Vocal que puede recibir la tilde — ajustada al tamaño de la letra */
    .vowel-zone {
      display:inline;
      border-radius:3px;
      padding:0;
      margin:0;
      cursor:default;
      transition:background .15s, color .15s;
      outline-offset:1px;
    }
    .vowel-zone.over    { background:var(--yellow); color:var(--text); }
    .vowel-zone.placed  { background:#E3F2FD; color:var(--blue-dk); font-weight:bold;
                          border-radius:4px; outline:2px solid var(--blue); }
    .vowel-zone.correct { background:#C8E6C9; color:var(--green-dk); font-weight:bold; outline:none; }
    .vowel-zone.wrong   { background:#FFCDD2; color:var(--red); outline:none;
                          animation: vshake .3s; }
    @keyframes vshake {
      0%,100%{transform:translateX(0)} 30%{transform:translateX(-4px)} 70%{transform:translateX(4px)}
    }
    .tilde-bank {
      display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin:16px 0;
    }
    .tilde-chip {
      background:var(--coral); color:#fff; border-radius:50%;
      width:44px; height:44px; line-height:44px;
      text-align:center; font-size:1.5rem; cursor:grab;
      box-shadow:var(--shadow); user-select:none; touch-action:none;
      display:inline-block;
    }
    .score-detail { font-size:1rem; color:#888; margin-top:6px; }
    .round-info { color:var(--blue-dk); font-size:1rem; margin-bottom:4px; }
  </style>
</head>
<body>
  <div class="game-header">
    <h1>📖 Juego 6 — Las tildes viajeras</h1>
    <div class="score-box">⭐ <span id="score">0</span></div>
  </div>

  <div class="game-area">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <p class="instruction">Arrastra la <span style="color:var(--coral);font-size:1.3rem">´</span> tilde sobre la vocal correcta</p>
    <p class="round-info" id="roundInfo"></p>
    <div class="sentence-area" id="sentenceArea"></div>
    <div class="tilde-bank" id="tildeBank"></div>
    <div style="text-align:center;margin-top:12px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-yellow" id="checkBtn" onclick="checkAnswers()">✔ Comprobar</button>
      <button class="btn btn-green"  id="nextBtn" style="display:none" onclick="nextEx()">Siguiente ▶</button>
    </div>
    <p class="score-detail" id="scoreDetail"></p>
  </div>

  <script src="../assets/score.js"></script>
  <script>
  // Each exercise: sentence with words that need tilde.
  // Format: array of tokens; token = {text, needsTilde: bool, vowelIdx: int}
  const exercises = [
    {
      label:'Palabras con tilde: mamá y café',
      tokens: [
        {t:'Mi'},{t:'mama',tilde:true,v:3},{t:'toma'},{t:'cafe',tilde:true,v:3},{t:'cada'},{t:'mañana.'}
      ]
    },
    {
      label:'árbol y lápiz',
      tokens:[
        {t:'El'},{t:'arbol',tilde:true,v:0},{t:'tiene'},{t:'un'},{t:'lapiz',tilde:true,v:1},{t:'debajo.'}
      ]
    },
    {
      label:'música y fácil',
      tokens:[
        {t:'La'},{t:'musica',tilde:true,v:1},{t:'es'},{t:'facil',tilde:true,v:1},{t:'de'},{t:'aprender.'}
      ]
    },
    {
      label:'camión y bebé',
      tokens:[
        {t:'El'},{t:'camion',tilde:true,v:4},{t:'lleva'},{t:'al'},{t:'bebe',tilde:true,v:3},{t:'al'},{t:'parque.'}
      ]
    },
    {
      label:'médico y rápido',
      tokens:[
        {t:'El'},{t:'medico',tilde:true,v:1},{t:'es'},{t:'muy'},{t:'rapido',tilde:true,v:1},{t:'hoy.'}
      ]
    },
    {
      label:'pájaro y bebió',
      tokens:[
        {t:'El'},{t:'pajaro',tilde:true,v:1},{t:'bebio',tilde:true,v:4},{t:'del'},{t:'rio.'}
      ]
    },
    {
      label:'papá y mamá',
      tokens:[
        {t:'Papa',tilde:true,v:3},{t:'y'},{t:'mama',tilde:true,v:3},{t:'van'},{t:'al'},{t:'mercado.'}
      ]
    },
    {
      label:'jardín y sofá',
      tokens:[
        {t:'En'},{t:'el'},{t:'jardin',tilde:true,v:4},{t:'hay'},{t:'un'},{t:'sofa',tilde:true,v:3},{t:'verde.'}
      ]
    },
  ];

  const shuffled=[...exercises].sort(()=>Math.random()-.5);
  let current=0, score=0;
  let pendingTildes=0, placedCorrect=0;

  function showEx(){
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('checkBtn').disabled = false;
    document.getElementById('scoreDetail').textContent='';
    document.getElementById('progressBar').style.width=(current/shuffled.length*100)+'%';
    const ex=shuffled[current];
    document.getElementById('roundInfo').textContent=`Ejercicio ${current+1} de ${shuffled.length} — ¿dónde van las tildes?`;

    // Build sentence: tilde-words → each vowel is an individual drop zone
    let tildesNeeded=0;
    const html=ex.tokens.map((tok,ti)=>{
      if(!tok.tilde) return `<span> ${tok.t} </span>`;
      tildesNeeded++;
      // Render the word: each VOWEL is a separate drop zone (normal looking)
      const VOWELS = 'aeiouAEIOU';
      const word = tok.t;
      let wordHtml = ' ';
      for(let ci=0; ci<word.length; ci++){
        const ch = word[ci];
        if(VOWELS.includes(ch)){
          const isCorrect = ci===tok.v;
          wordHtml += `<span class="vowel-zone" id="vz_${ti}_${ci}" data-drop="true" data-ti="${ti}" data-ci="${ci}" data-correct="${isCorrect}">${ch}</span>`;
        } else {
          wordHtml += ch;
        }
      }
      wordHtml += ' ';
      return `<span id="word${ti}">${wordHtml}</span>`;
    }).join('');

    document.getElementById('sentenceArea').innerHTML=html;
    pendingTildes=tildesNeeded;
    placedCorrect=0;

    // Drop zones — one per vowel in each tilde-word
    document.querySelectorAll('.vowel-zone').forEach(zone=>{
      makeDropZone(zone,(val,srcId,z)=>{
        if(z.dataset.resolved) return;
        // Place the tilde neutrally — feedback only on Comprobar
        const ti=parseInt(z.dataset.ti);
        // Remove previous placement in this word (only one tilde per word)
        document.querySelectorAll(`.vowel-zone[data-ti="${ti}"].placed`).forEach(vz=>{
          // Restore original vowel
          vz.textContent = vz.dataset.original;
          vz.classList.remove('placed');
          delete vz.dataset.hasPlaced;
        });
        z.dataset.original = z.dataset.original || z.textContent;
        z.textContent = tildeOf(z.textContent);
        z.classList.add('placed');
        z.dataset.hasPlaced = 'true';
        // Hide the used chip
        const chip = document.getElementById(srcId);
        if(chip) chip.style.visibility='hidden';
        // Return chip visibility if word was re-placed
        updateChipsVisibility();
      });
    });

    // Tilde chips bank
    const bank=document.getElementById('tildeBank');
    bank.innerHTML='';
    for(let i=0;i<tildesNeeded;i++){
      const chip=document.createElement('div');
      chip.className='tilde-chip';
      chip.id='tChip'+i;
      chip.dataset.value='tilde';
      chip.draggable=true;
      chip.textContent='´';
      bank.appendChild(chip);
      makeDraggable(chip);
    }
  }

  function updateChipsVisibility(){
    // Count placed tildes to know how many chips to hide
    const placedCount = document.querySelectorAll('.vowel-zone.placed').length;
    document.querySelectorAll('.tilde-chip').forEach((chip,i)=>{
      chip.style.visibility = i < placedCount ? 'hidden' : 'visible';
    });
  }

  function checkAnswers(){
    document.getElementById('checkBtn').disabled = true;
    let correct=0, wrong=0;
    const ex = shuffled[current];
    // For each tilde-word, check if there is a placed vowel and if it's the right one
    ex.tokens.forEach((tok,ti)=>{
      if(!tok.tilde) return;
      const placedZone = document.querySelector(`.vowel-zone[data-ti="${ti}"].placed`);
      if(placedZone){
        const isCorrect = placedZone.dataset.correct==='true';
        placedZone.classList.remove('placed');
        placedZone.classList.add(isCorrect ? 'correct' : 'wrong');
        if(isCorrect){
          correct++;
          score+=10;
        } else {
          // restore un-accented vowel
          const orig = placedZone.dataset.original;
          placedZone.textContent = orig || placedZone.textContent;
          setTimeout(()=>{
            placedZone.classList.remove('wrong');
          }, 700);
        }
      }
    });
    document.getElementById('score').textContent = score;
    const total = pendingTildes;
    if(correct===total){
      Sound.fanfare();
      document.getElementById('scoreDetail').textContent=`🌟 ¡Perfecto! ${correct} de ${total} tildes correctas`;
    } else {
      Sound.wrong();
      document.getElementById('scoreDetail').textContent=`✅ ${correct} de ${total} tildes correctas — ¡inténtalo de nuevo!`;
    }
    setTimeout(()=>{ document.getElementById('nextBtn').style.display='inline-block'; }, 500);
  }

  function tildeOf(v){
    return {a:'á',e:'é',i:'í',o:'ó',u:'ú'}[v.toLowerCase()] || v;
  }

  function nextEx(){
    current++;
    if(current>=shuffled.length) maybePodio(6,score,shuffled.length*10);
    else showEx();
  }

  showEx();
  </script>
</body>
</html>
