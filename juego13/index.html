<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego 13 – BR o BL</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .word-row { display:flex; align-items:center; justify-content:center; gap:4px; font-size:2.4rem; margin:16px 0; flex-wrap:wrap; }
    .word-chunk { color:var(--blue-dk); }
    .ex-icon { font-size:5rem; display:block; text-align:center; margin-bottom:4px; }
    .hint { color:#888; font-size:.95rem; margin-top:8px; }
  </style>
</head>
<body>
  <div class="game-header">
    <h1>🐦 BR o BL</h1>
    <div class="score-box">⭐ <span id="score">0</span></div>
  </div>
  <div class="game-area" id="gameArea">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <p class="instruction">Arrastra <strong>BR</strong> o <strong>BL</strong> al hueco correcto</p>
    <div id="exerciseZone"></div>
    <div class="tiles-bank" id="tilesBank">
      <div class="tile" id="tileBR" data-value="BR" draggable="true">BR</div>
      <div class="tile" id="tileBL" data-value="BL" draggable="true" style="background:var(--purple)">BL</div>
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-green" id="nextBtn" style="display:none" onclick="nextEx()">Siguiente ▶</button>
    </div>
    <p class="hint" id="hintText"></p>
  </div>
  <script src="../assets/score.js"></script>
  <script>
  const exercises = [
    { prefix:'ca',      suffix:'a',    answer:'BR', emoji:'🐐', label:'cabra' },
    { prefix:'',        suffix:'anco', answer:'BL', emoji:'⬜', label:'blanco' },
    { prefix:'',        suffix:'oma',  answer:'BR', emoji:'😂', label:'broma' },
    { prefix:'',        suffix:'oche', answer:'BR', emoji:'🧷', label:'broche' },
    { prefix:'',        suffix:'ando', answer:'BL', emoji:'🧸', label:'blando' },
    { prefix:'',        suffix:'echa', answer:'BR', emoji:'🔨', label:'brecha' },
    { prefix:'',        suffix:'usa',  answer:'BL', emoji:'👔', label:'blusa' },
    { prefix:'ama',     suffix:'e',    answer:'BL', emoji:'😊', label:'amable' },
    { prefix:'comesti', suffix:'e',    answer:'BL', emoji:'🍎', label:'comestible' },
    { prefix:'coli',    suffix:'í',    answer:'BR', emoji:'🐦', label:'colibrí' },
    { prefix:'candela', suffix:'o',    answer:'BR', emoji:'🕯️', label:'candelabro' },
    { prefix:'calam',   suffix:'e',    answer:'BR', emoji:'⚡', label:'calambre' },
  ];

  const shuffled = [...exercises].sort(() => Math.random() - .5).slice(0, 10);
  let current = 0, score = 0, answered = false;

  function showEx() {
    const ex = shuffled[current];
    answered = false;
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('hintText').textContent = '';
    document.getElementById('progressBar').style.width = (current / shuffled.length * 100) + '%';

    document.getElementById('exerciseZone').innerHTML = `
      <span class="ex-icon">${ex.emoji}</span>
      <div class="word-row">
        <span class="word-chunk">${ex.prefix}</span>
        <span class="blank" id="blank" data-drop="true" data-answer="${ex.answer}"></span>
        <span class="word-chunk">${ex.suffix}</span>
      </div>`;

    const blank = document.getElementById('blank');
    makeDropZone(blank, (val, srcId, zone) => {
      if (answered) return;
      answered = true;
      const correct = val === ex.answer;
      zone.textContent = val;
      zone.classList.add(correct ? 'correct' : 'wrong');
      if (correct) { score += 10; document.getElementById('score').textContent = score; }
      showFeedback(correct, correct ? '¡Correcto! 🎉' : `Era <strong>${ex.answer}</strong> — ${ex.label}`);
      document.getElementById('nextBtn').style.display = 'inline-block';
    });

    [document.getElementById('tileBR'), document.getElementById('tileBL')].forEach(makeDraggable);
  }

  function nextEx() {
    current++;
    if (current >= shuffled.length) {
      maybePodio(13, score, shuffled.length * 10);
    } else {
      showEx();
    }
  }

  showEx();
  </script>
</body>
</html>
